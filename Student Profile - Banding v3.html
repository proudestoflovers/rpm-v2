//           <TweakColor  label="Palette" value={t.palette}
//                        options={[['#D97757', '#29261b', '#f6f4ef'],

//
// TweakRadio is the segmented control for 2–3 short options (auto-falls-back to
// TweakSelect past ~16/~10 chars per label); reach for TweakSelect directly when
// options are many or long. For color tweaks always curate 3-4 options rather than
// a free picker; an option can also be a whole 2–5 color palette (the stored value

/* END USAGE */
// ─────────────────────────────────────────────────────────────────────────────

// ── useTweaks ───────────────────────────────────────────────────────────────
// Single source of truth for tweak values. setTweak persists via the host
// (__edit_mode_set_keys → host rewrites the EDITMODE block on disk).
function useTweaks(defaults) {
  const [values, setValues] = React.useState(defaults);
  // Accepts either setTweak('key', value) or setTweak({ key: value, ... }) so a
  // useState-style call doesn't write a "[object Object]" key into the persisted
  // JSON block.
  const setTweak = React.useCallback((keyOrEdits, val) => {
    const edits = typeof keyOrEdits === 'object' && keyOrEdits !== null
      ? keyOrEdits : { [keyOrEdits]: val };
    setValues((prev) => ({ ...prev, ...edits }));
    window.parent.postMessage({ type: '__edit_mode_set_keys', edits }, '*');
    // Same-window signal so in-page listeners (deck-stage rail thumbnails)
    // can react — the parent message only reaches the host, not peers.
    window.dispatchEvent(new CustomEvent('tweakchange', { detail: edits }));
  }, []);
  return [values, setTweak];
}

// ── TweaksPanel ─────────────────────────────────────────────────────────────
// Floating shell. Registers the protocol listener BEFORE announcing
// availability — if the announce ran first, the host's activate could land
// before our handler exists and the toolbar toggle would silently no-op.
// The close button posts __edit_mode_dismissed so the host's toolbar toggle
// flips off in lockstep; the host echoes __deactivate_edit_mode back which
// is what actually hides the panel.
function TweaksPanel({ title = 'Tweaks', children }) {
  const [open, setOpen] = React.useState(false);
  const dragRef = React.useRef(null);
  const offsetRef = React.useRef({ x: 16, y: 16 });
  const PAD = 16;

  const clampToViewport = React.useCallback(() => {
    const panel = dragRef.current;
    if (!panel) return;
    const w = panel.offsetWidth, h = panel.offsetHeight;
    const maxRight = Math.max(PAD, window.innerWidth - w - PAD);
    const maxBottom = Math.max(PAD, window.innerHeight - h - PAD);
    offsetRef.current = {
      x: Math.min(maxRight, Math.max(PAD, offsetRef.current.x)),
      y: Math.min(maxBottom, Math.max(PAD, offsetRef.current.y)),
    };
    panel.style.right = offsetRef.current.x + 'px';
    panel.style.bottom = offsetRef.current.y + 'px';
  }, []);

  React.useEffect(() => {
    if (!open) return;
    clampToViewport();
    if (typeof ResizeObserver === 'undefined') {
      window.addEventListener('resize', clampToViewport);
      return () => window.removeEventListener('resize', clampToViewport);
    }
    const ro = new ResizeObserver(clampToViewport);
    ro.observe(document.documentElement);
    return () => ro.disconnect();
  }, [open, clampToViewport]);

  React.useEffect(() => {
    const onMsg = (e) => {
      const t = e?.data?.type;
      if (t === '__activate_edit_mode') setOpen(true);
      else if (t === '__deactivate_edit_mode') setOpen(false);
    };
    window.addEventListener('message', onMsg);
    window.parent.postMessage({ type: '__edit_mode_available' }, '*');
    return () => window.removeEventListener('message', onMsg);
  }, []);

  const dismiss = () => {
    setOpen(false);
    window.parent.postMessage({ type: '__edit_mode_dismissed' }, '*');
  };

  const onDragStart = (e) => {
    const panel = dragRef.current;
    if (!panel) return;
    const r = panel.getBoundingClientRect();
    const sx = e.clientX, sy = e.clientY;
    const startRight = window.innerWidth - r.right;
    const startBottom = window.innerHeight - r.bottom;
    const move = (ev) => {
      offsetRef.current = {
        x: startRight - (ev.clientX - sx),
        y: startBottom - (ev.clientY - sy),
      };
      clampToViewport();
    };
    const up = () => {
      window.removeEventListener('mousemove', move);
      window.removeEventListener('mouseup', up);
    };
    window.addEventListener('mousemove', move);
    window.addEventListener('mouseup', up);
  };

  if (!open) return null;
  return (
    <>
      <style>{__TWEAKS_STYLE}</style>
      <div ref={dragRef} className="twk-panel" data-omelette-chrome=""
           style={{ right: offsetRef.current.x, bottom: offsetRef.current.y }}>
        <div className="twk-hd" onMouseDown={onDragStart}>
          <b>{title}</b>
          <button className="twk-x" aria-label="Close tweaks"
                  onMouseDown={(e) => e.stopPropagation()}
                  onClick={dismiss}>✕</button>
        </div>
        <div className="twk-body">
          {children}
        </div>
      </div>
    </>
  );
}

// ── Layout helpers ──────────────────────────────────────────────────────────

function TweakSection({ label, children }) {
  return (
    <>
      <div className="twk-sect">{label}</div>
      {children}
    </>
  );
}

function TweakRow({ label, value, children, inline = false }) {
  return (
    <div className={inline ? 'twk-row twk-row-h' : 'twk-row'}>
      <div className="twk-lbl">
        <span>{label}</span>
        {value != null && <span className="twk-val">{value}</span>}
      </div>
      {children}
    </div>
  );
}

// ── Controls ────────────────────────────────────────────────────────────────

function TweakSlider({ label, value, min = 0, max = 100, step = 1, unit = '', onChange }) {
  return (
    <TweakRow label={label} value={`${value}${unit}`}>
      <input type="range" className="twk-slider" min={min} max={max} step={step}
             value={value} onChange={(e) => onChange(Number(e.target.value))} />
    </TweakRow>
  );
}

function TweakToggle({ label, value, onChange }) {
  return (
    <div className="twk-row twk-row-h">
      <div className="twk-lbl"><span>{label}</span></div>
      <button type="button" className="twk-toggle" data-on={value ? '1' : '0'}
              role="switch" aria-checked={!!value}
              onClick={() => onChange(!value)}><i /></button>
    </div>
  );
}

function TweakRadio({ label, value, options, onChange }) {
  const trackRef = React.useRef(null);
  const [dragging, setDragging] = React.useState(false);
  // The active value is read by pointer-move handlers attached for the lifetime
  // of a drag — ref it so a stale closure doesn't fire onChange for every move.
  const valueRef = React.useRef(value);
  valueRef.current = value;

  // Segments wrap mid-word once per-segment width runs out. The track is
  // ~248px (280 panel − 28 body pad − 4 seg pad), each button loses 12px
  // to its own padding, and 11.5px system-ui averages ~6.3px/char — so 2
  // options fit ~16 chars each, 3 fit ~10. Past that (or >3 options), fall
  // back to a dropdown rather than wrap.
  const labelLen = (o) => String(typeof o === 'object' ? o.label : o).length;
  const maxLen = options.reduce((m, o) => Math.max(m, labelLen(o)), 0);
  const fitsAsSegments = maxLen <= ({ 2: 16, 3: 10 }[options.length] ?? 0);
  if (!fitsAsSegments) {
    // <select> emits strings — map back to the original option value so the
    // fallback stays type-preserving (numbers, booleans) like the segment path.
    const resolve = (s) => {
      const m = options.find((o) => String(typeof o === 'object' ? o.value : o) === s);
      return m === undefined ? s : typeof m === 'object' ? m.value : m;
    };
    return <TweakSelect label={label} value={value} options={options}
                        onChange={(s) => onChange(resolve(s))} />;
  }
  const opts = options.map((o) => (typeof o === 'object' ? o : { value: o, label: o }));
  const idx = Math.max(0, opts.findIndex((o) => o.value === value));
  const n = opts.length;

  const segAt = (clientX) => {
    const r = trackRef.current.getBoundingClientRect();
    const inner = r.width - 4;
    const i = Math.floor(((clientX - r.left - 2) / inner) * n);
    return opts[Math.max(0, Math.min(n - 1, i))].value;
  };

  const onPointerDown = (e) => {
    setDragging(true);
    const v0 = segAt(e.clientX);
    if (v0 !== valueRef.current) onChange(v0);
    const move = (ev) => {
      if (!trackRef.current) return;
      const v = segAt(ev.clientX);
      if (v !== valueRef.current) onChange(v);
    };
    const up = () => {
      setDragging(false);
      window.removeEventListener('pointermove', move);
      window.removeEventListener('pointerup', up);
    };
    window.addEventListener('pointermove', move);
    window.addEventListener('pointerup', up);
  };

  return (
    <TweakRow label={label}>
      <div ref={trackRef} role="radiogroup" onPointerDown={onPointerDown}
           className={dragging ? 'twk-seg dragging' : 'twk-seg'}>
        <div className="twk-seg-thumb"
             style={{ left: `calc(2px + ${idx} * (100% - 4px) / ${n})`,
                      width: `calc((100% - 4px) / ${n})` }} />
        {opts.map((o) => (
          <button key={o.value} type="button" role="radio" aria-checked={o.value === value}>
            {o.label}
          </button>
        ))}
      </div>
    </TweakRow>
  );
}

function TweakSelect({ label, value, options, onChange }) {
  return (
    <TweakRow label={label}>
      <select className="twk-field" value={value} onChange={(e) => onChange(e.target.value)}>
        {options.map((o) => {
          const v = typeof o === 'object' ? o.value : o;
          const l = typeof o === 'object' ? o.label : o;
          return <option key={v} value={v}>{l}</option>;
        })}
      </select>
    </TweakRow>
  );
}

function TweakText({ label, value, placeholder, onChange }) {
  return (
    <TweakRow label={label}>
      <input className="twk-field" type="text" value={value} placeholder={placeholder}
             onChange={(e) => onChange(e.target.value)} />
    </TweakRow>
  );
}

function TweakNumber({ label, value, min, max, step = 1, unit = '', onChange }) {
  const clamp = (n) => {
    if (min != null && n < min) return min;
    if (max != null && n > max) return max;
    return n;
  };
  const startRef = React.useRef({ x: 0, val: 0 });
  const onScrubStart = (e) => {
    e.preventDefault();
    startRef.current = { x: e.clientX, val: value };
    const decimals = (String(step).split('.')[1] || '').length;
    const move = (ev) => {
      const dx = ev.clientX - startRef.current.x;
      const raw = startRef.current.val + dx * step;
      const snapped = Math.round(raw / step) * step;
      onChange(clamp(Number(snapped.toFixed(decimals))));
    };
    const up = () => {
      window.removeEventListener('pointermove', move);
      window.removeEventListener('pointerup', up);
    };
    window.addEventListener('pointermove', move);
    window.addEventListener('pointerup', up);
  };
  return (
    <div className="twk-num">
      <span className="twk-num-lbl" onPointerDown={onScrubStart}>{label}</span>
      <input type="number" value={value} min={min} max={max} step={step}
             onChange={(e) => onChange(clamp(Number(e.target.value)))} />
      {unit && <span className="twk-num-unit">{unit}</span>}
    </div>
  );
}

// Relative-luminance contrast pick — checkmarks drawn over a swatch need to
// read on both #111 and #fafafa without per-option configuration. Hex input
// only (#rgb / #rrggbb); named or rgb()/hsl() colors fall through to "light".
function __twkIsLight(hex) {
  const h = String(hex).replace('#', '');
  const x = h.length === 3 ? h.replace(/./g, (c) => c + c) : h.padEnd(6, '0');
  const n = parseInt(x.slice(0, 6), 16);
  if (Number.isNaN(n)) return true;
  const r = (n >> 16) & 255, g = (n >> 8) & 255, b = n & 255;
  return r * 299 + g * 587 + b * 114 > 148000;
}

const __TwkCheck = ({ light }) => (
  <svg viewBox="0 0 14 14" aria-hidden="true">
    <path d="M3 7.2 5.8 10 11 4.2" fill="none" strokeWidth="2.2"
          strokeLinecap="round" strokeLinejoin="round"
          stroke={light ? 'rgba(0,0,0,.78)' : '#fff'} />
  </svg>
);

// TweakColor — curated color/palette picker. Each option is either a single
// hex string or an array of 1-5 hex strings; the card adapts — a lone color
// renders solid, a palette renders colors[0] as the hero (left ~2/3) with the
// rest stacked in a sharp column on the right. onChange emits the
// option in the shape it was passed (string stays string, array stays array).
// Without options it falls back to the native color input for back-compat.
function TweakColor({ label, value, options, onChange }) {
  if (!options || !options.length) {
    return (
      <div className="twk-row twk-row-h">
        <div className="twk-lbl"><span>{label}</span></div>
        <input type="color" className="twk-swatch" value={value}
               onChange={(e) => onChange(e.target.value)} />
      </div>
    );
  }
  // Native <input type=color> emits lowercase hex per the HTML spec, so
  // compare case-insensitively. String() guards JSON.stringify(undefined),
  // which returns the primitive undefined (no .toLowerCase).
  const key = (o) => String(JSON.stringify(o)).toLowerCase();
  const cur = key(value);
  return (
    <TweakRow label={label}>
      <div className="twk-chips" role="radiogroup">
        {options.map((o, i) => {
          const colors = Array.isArray(o) ? o : [o];
          const [hero, ...rest] = colors;
          const sup = rest.slice(0, 4);
          const on = key(o) === cur;
          return (
            <button key={i} type="button" className="twk-chip" role="radio"
                    aria-checked={on} data-on={on ? '1' : '0'}
                    aria-label={colors.join(', ')} title={colors.join(' · ')}
                    style={{ background: hero }}
                    onClick={() => onChange(o)}>
              {sup.length > 0 && (
                <span>
                  {sup.map((c, j) => <i key={j} style={{ background: c }} />)}
                </span>
              )}
              {on && <__TwkCheck light={__twkIsLight(hero)} />}
            </button>
          );
        })}
      </div>
    </TweakRow>
  );
}

function TweakButton({ label, onClick, secondary = false }) {
  return (
    <button type="button" className={secondary ? 'twk-btn secondary' : 'twk-btn'}
            onClick={onClick}>{label}</button>
  );
}

Object.assign(window, {
  useTweaks, TweaksPanel, TweakSection, TweakRow,
  TweakSlider, TweakToggle, TweakRadio, TweakSelect,
  TweakText, TweakNumber, TweakColor, TweakButton,
});

        {sc !== null ? `${sc}%` : '0%'}
      </span>
    </div>);

}

/* ── Annotated bar for side panel ───────────────────────────────────── */
function AnnotatedBar({ sc, band, subj }) {
  const fill = band ? BAND[band].bar : '#d1d5db';
  const track = band && sc ? BAND[band].bg : '#e8e8ea';
  return (
    <div style={{ position: 'relative', height: 15, borderRadius: 4, overflow: 'hidden', background: track }}>
      {sc !== null && sc > 0 &&
      <div style={{ width: `${sc}%`, height: '100%', background: fill, borderRadius: 4 }} />
      }
    </div>);

}

/* ── Header ──────────────────────────────────────────────────────────── */
function Header({ student, rows, onView, collapsed, densityMult, accentColor, borderStyle }) {
  const nsCount = rows.filter((r) => r.st === 'ns').length;
  const ipCount = rows.filter((r) => r.st === 'ip').length;
  const doneRows = rows.filter((r) => r.st === 'done');
  const avgSc = doneRows.length ? Math.round(doneRows.reduce((s, r) => s + (r.sc || 0), 0) / doneRows.length) : 0;
  const avgKey = avgSc >= 80 ? 'prof' : avgSc >= 55 ? 'i' : avgSc >= 33 ? 'e' : 'p';
  const avgBand = BAND[avgKey];

  function goBack() {
    window.location.href = 'Roster Run HiFi v2.html';
  }

  return (
    <div style={{ background: '#fff', borderBottom: '1px solid #e1e1e3', padding: `0 ${32 * densityMult}px`, flexShrink: 0 }}>
      {collapsed ?
      /* Compact — breadcrumb + avatar + name condensed to one line */
      <div style={{ display: 'flex', alignItems: 'center', gap: 14, height: 58, opacity: collapsed ? 1 : 0, transform: collapsed ? 'translateY(0)' : 'translateY(-20px)', transition: 'opacity .26s, transform .26s' }}>
        <button onClick={goBack} style={{ display: 'flex', alignItems: 'center', gap: 5, fontSize: 13.5, fontWeight: 600, color: '#6d6d6f', cursor: 'pointer', flexShrink: 0 }}>
          <Ico n="chevLeft" size={15} sw={2.5} stroke="#6d6d6f" />
          All students
        </button>
        <div style={{ width: 1, height: 22, background: '#e1e1e3', flexShrink: 0 }} />
        <div style={{ width: 34, height: 34, borderRadius: '50%', background: '#f4f4f6', flexShrink: 0,
          display: 'flex', alignItems: 'center', justifyContent: 'center', fontSize: 20, lineHeight: 1,
          border: '1px solid #ebebeb', overflow: 'hidden', userSelect: 'none' }}>
          {student.emoji}
        </div>
        <div style={{ display: 'flex', alignItems: 'baseline', gap: 9, minWidth: 0 }}>
          <span style={{ fontSize: 18, fontWeight: 700, color: '#1d1d1f', letterSpacing: '-.01em', whiteSpace: 'nowrap' }}>{student.name}</span>
          <span style={{ fontSize: 13.5, color: '#6d6d6f', fontWeight: 500, whiteSpace: 'nowrap' }}>{student.grade}</span>
        </div>
      </div> :

      /* Expanded — breadcrumb on its own line, full-size avatar + name lockup with chart floated right */
      <div style={{ paddingTop: 14, marginBottom: 18, opacity: collapsed ? 0 : 1, transform: collapsed ? 'translateY(20px)' : 'translateY(0)', transition: 'opacity .26s, transform .26s' }}>

          <Ico n="chevLeft" size={15} sw={2.5} stroke="#49494b" />
          All students
        </button>
        <div style={{ display: 'flex', alignItems: 'flex-start', justifyContent: 'space-between', gap: 24 }}>
          {/* Avatar + name lockup */}
          <div style={{ display: 'flex', alignItems: 'center', gap: 16, flexShrink: 0, paddingTop: 6 }}>
            <div style={{ width: 52, height: 52, borderRadius: '50%', background: '#f4f4f6', flexShrink: 0,
              display: 'flex', alignItems: 'center', justifyContent: 'center', fontSize: 30, lineHeight: 1,
              border: '1px solid #ebebeb', overflow: 'hidden', userSelect: 'none' }}>
              {student.emoji}
            </div>
            <div>
              <div style={{ fontSize: 26, fontWeight: 800, color: '#1d1d1f', letterSpacing: '-.02em', lineHeight: 1.2 }}>{student.name}</div>
              <div style={{ fontSize: 13.5, color: '#6d6d6f', fontWeight: 500, marginTop: 2 }}>{student.grade}</div>
            </div>
          </div>

        </div>
      </div>
      }

      {/* Tabs */}
      <div style={{ display: 'flex' }}>

            {t}
          </div>

}

}

}

/* ── NotesModal ──────────────────────────────────────────────────────── */
function NotesModal({ isOpen, onClose }) {
  React.useEffect(() => {
    if (!isOpen) return;
    const handleBackdropClick = (e) => {
      if (e.target === e.currentTarget) onClose();
    };
    document.addEventListener('mousedown', handleBackdropClick);
    return () => document.removeEventListener('mousedown', handleBackdropClick);
  }, [isOpen, onClose]);

  if (!isOpen) return null;

  return (
    <div onClick={onClose} style={{ position: 'fixed', top: 0, left: 0, right: 0, bottom: 0, background: 'rgba(0,0,0,0.4)', display: 'flex', alignItems: 'center', justifyContent: 'center', zIndex: 1000 }}>

  const [open, setOpen] = React.useState(true);
  const unitNum = (u) => {const m = u.match(/Unit\s+(\d+)/);return m ? +m[1] : 99;};
  const unitKeys = Object.keys(units).sort((a, b) => unitNum(a) - unitNum(b));
  const allRows = unitKeys.flatMap((u) => units[u]);
  const doneRows = allRows.filter((r) => r.st === 'done');
  return (
    <section style={{ marginBottom: 28 }}>
      <div style={{ display: 'flex', alignItems: 'center', gap: 14, marginBottom: open ? 18 : 0 }}>

            <th key={h} style={{ padding: '11px 16px', textAlign: 'left', fontSize: 12.5, fontWeight: 700, color: '#6d6d6f', letterSpacing: '.02em', whiteSpace: 'nowrap', width: h === 'Assignment' ? 'auto' : undefined }}>{h}</th>
            )}
            <th style={{ padding: '11px 16px', textAlign: 'left', fontSize: 12.5, fontWeight: 700, color: '#6d6d6f', letterSpacing: '.02em', whiteSpace: 'nowrap', width: '100%' }}>Performance</th>
            <th style={{ width: 60 }} /><th style={{ width: 36 }} />
          </tr>
        </thead>
        <tbody>
          {doneRows.map((row) =>
          <TableRow key={row.id} row={row} selected={selected.has(row.id)} onSelect={toggle} onView={onView} />
          )}
        </tbody>
      </table>
    </div>);

}

/* ── NextStepLabel — lightbulb + label inline with "Next step" ──── */
function NextStepLabel() {
  return (
    <div style={{ display: 'flex', alignItems: 'center', gap: 6, fontSize: 13, fontWeight: 600, color: '#6d6d6f' }}>
      <div style={{ flexShrink: 0, display: 'flex', alignItems: 'center' }}><Ico n="bulb" size={14} stroke="#6d6d6f" sw={2} /></div>
      <span>Recommended next steps</span>
    </div>);

}

/* ── SuggestionLabel — label for next step suggestions ──── */
function SuggestionLabel({ label }) {
  return (
    <div style={{ display: 'flex', alignItems: 'flex-start', gap: 6, marginBottom: 12 }}>
      <span style={{ fontWeight: 500, color: '#1d1d1f', fontSize: "14px" }}>{label}</span>
    </div>);

}

/* ── AssignButton ───────────────────────────────────────────────────── */
function AssignButton({ label, primary = true }) {
  return (
    <button style={{ height: 44, borderRadius: 100, background: primary ? '#141415' : 'transparent', color: primary ? '#fff' : '#1d1d1f', fontFamily: "'Figtree',sans-serif", fontSize: 14, fontWeight: 600, border: primary ? 'none' : '1.5px solid #323234', display: 'flex', alignItems: 'center', justifyContent: 'center', gap: 8, cursor: 'pointer', width: 'auto', paddingLeft: 20, paddingRight: 20, whiteSpace: 'nowrap' }}>
      <Ico n="users" size={16} stroke={primary ? '#fff' : 'currentColor'} sw={2.5} />
      {label}
    </button>);

}

/* ── OrDivider — vertical "or" rule between side-by-side options ─────── */
function OrDivider() {
  return (
    <div style={{ display: 'flex', flexDirection: 'column', alignItems: 'center', gap: 8, alignSelf: 'stretch', flexShrink: 0 }}>
      <div style={{ flex: 1, width: 1, background: '#e8e8ea' }} />
      <span style={{ fontSize: 12, fontWeight: 600, color: '#9a9a9c' }}>or</span>
      <div style={{ flex: 1, width: 1, background: '#e8e8ea' }} />
    </div>);

}

/* ── ReteachIdeasCard ───────────────────────────────────────────────── */
function ReteachIdeasCard() {
  return (
    <div style={{ background: '#fff', borderRadius: 16, border: '1px solid #e8e8ea', boxShadow: '0 1px 3px rgba(29,29,31,.06)' }}>
      <div style={{ display: 'flex', flexDirection: 'column', gap: 4, padding: '16px 20px', borderBottom: '1px solid #e8e8ea' }}>
        <div style={{ fontSize: 18, fontWeight: 700, color: '#1d1d1f', lineHeight: 1.2 }}>Reteach ideas</div>
        <ul style={{ listStyle: 'none', paddingLeft: 0, margin: '8px 0 0 0' }}>
          {[0, 1, 2].map((i) => (
            <li key={i} style={{ display: 'flex', gap: 8, marginBottom: 8, alignItems: 'flex-start' }}>
              <span style={{ width: 6, height: 6, background: '#9a9a9c', borderRadius: '50%', flexShrink: 0, marginTop: 6 }} />
              <div style={{ height: 14, background: '#d1d5db', borderRadius: 3, flex: 1 }} />
            </li>
          ))}
        </ul>
      </div>
      <div style={{ textAlign: 'center', padding: 12 }}>
        <button style={{ appearance: 'none', background: 'none', border: 'none', cursor: 'pointer', fontSize: 15, fontWeight: 600, color: '#1d1d1f', display: 'flex', alignItems: 'center', justifyContent: 'center', gap: 6, margin: '0 auto' }}>
          Re-assign <Ico n="arrowR" size={16} stroke="#1d1d1f" sw={2.5} />
        </button>
      </div>
    </div>
  );
}

/* ── NextStepStepper — carousel navigation for multiple next steps ──── */
function NextStepStepper({ currentIdx, totalCount, onPrev, onNext }) {
  return (
    <div style={{ display: 'flex', alignItems: 'center', gap: 12 }}>
      <button onClick={onPrev} disabled={!onPrev} style={{ appearance: 'none', background: 'transparent', border: 'none', cursor: onPrev ? 'pointer' : 'default', padding: 0, opacity: onPrev ? 1 : 0.4 }}>
        <Ico n="chevLeft" size={16} stroke="#49494b" sw={2.5} />
      </button>
      <span style={{ fontSize: 13, color: '#6d6d6f', fontWeight: 500, minWidth: '28px', textAlign: 'center' }}>{currentIdx + 1} / {totalCount}</span>
      <button onClick={onNext} disabled={!onNext} style={{ appearance: 'none', background: 'transparent', border: 'none', cursor: onNext ? 'pointer' : 'default', padding: 0, opacity: onNext ? 1 : 0.4 }}>
        <Ico n="chevRight" size={16} stroke="#49494b" sw={2.5} />
      </button>
    </div>
  );
}

/* ── NextStepSection ─────────────────────────────────────────────────── */
function NextStepSection({ row }) {
  const { band, lv, subj, unit, name } = row;
  const [currentIdx, setCurrentIdx] = React.useState(0);

  if (band === 'prof') {
    if (lv <= 2) {
      const options = [
        { label: 'Move to next skill', level: lv, buttonLabel: 'Assign next skill' },
        { label: 'Move up a level', level: lv + 1, buttonLabel: `Assign Level ${lv + 1}` }
      ];
      const current = options[currentIdx];
      const onPrev = currentIdx > 0 ? () => setCurrentIdx(currentIdx - 1) : null;
      const onNext = currentIdx < options.length - 1 ? () => setCurrentIdx(currentIdx + 1) : null;

      return (
        <section style={{ margin: 0 }}>
          <div style={{ display: 'flex', alignItems: 'center', justifyContent: 'space-between', marginBottom: 12 }}>
            <NextStepLabel />
            <NextStepStepper currentIdx={currentIdx} totalCount={options.length} onPrev={onPrev} onNext={onNext} />
          </div>
          <SuggestionLabel label={current.label} />
          <LessonPreviewCard subj={subj} unit={unit} level={current.level} lessonType="Lesson" title={name} />
        </section>
      );
    }
    return (
      <section style={{ margin: 0 }}>
        <NextStepLabel />
        <SuggestionLabel label="Move to next skill" />
        <LessonPreviewCard subj={subj} unit={unit} level={lv} lessonType="Lesson" title={name} />
      </section>
    );
  }

  if (band === 'i') {
    return (
      <section style={{ margin: 0 }}>
        <NextStepLabel />
        <SuggestionLabel label="Continue at current level with routine instruction and practice." />
      </section>
    );
  }

  if (band === 'e') {
    const options = [
      { label: 'Use reteach ideas from lesson plan', isReteach: true },
      { label: 'Try lower level', isReteach: false, level: Math.max(1, lv - 1) }
    ];
    const current = options[currentIdx];
    const onPrev = currentIdx > 0 ? () => setCurrentIdx(currentIdx - 1) : null;
    const onNext = currentIdx < options.length - 1 ? () => setCurrentIdx(currentIdx + 1) : null;

    return (
      <section style={{ margin: 0 }}>
        <div style={{ display: 'flex', alignItems: 'center', justifyContent: 'space-between', marginBottom: 12 }}>
          <NextStepLabel />
          <NextStepStepper currentIdx={currentIdx} totalCount={options.length} onPrev={onPrev} onNext={onNext} />
        </div>
        <SuggestionLabel label={current.label} />
        {current.isReteach ? (
          <ReteachIdeasCard />
        ) : (
          <LessonPreviewCard subj={subj} unit={unit} level={current.level} lessonType="Read Aloud" title={name} />
        )}
      </section>
    );
  }

  return (
    <section style={{ margin: 0 }}>
      <NextStepLabel />
      <SuggestionLabel label="Teach prerequisite skills before continuing this skill." />
      <LessonPreviewCard subj={subj} unit={unit} level={lv} lessonType="Lesson" title={name} />
    </section>
  );
}

/* ── LessonPreviewCard ──────────────────────────────────────────────── */
function LessonPreviewCard({ subj, unit, level, lessonType, title }) {
  return (
    <div style={{ background: '#fff', borderRadius: 16, border: '1px solid #e8e8ea', boxShadow: '0 1px 3px rgba(29,29,31,.06)' }}>
      <div style={{ display: 'flex', gap: 16, padding: '16px 20px', borderBottom: '1px solid #e8e8ea' }}>
        {/* Thumbnail placeholder */}
        <div style={{ width: 80, height: 80, borderRadius: 12, background: '#f0f0f2', flexShrink: 0, display: 'flex', alignItems: 'center', justifyContent: 'center' }}>
          <svg width={36} height={32} viewBox="0 0 36 32" fill="none">
            <rect x="1" y="1" width="34" height="30" rx="4" stroke="#c5c5c7" strokeWidth="1.5" fill="#e8e8ea" />
            <circle cx="12" cy="12" r="4" fill="#c5c5c7" />
            <path d="M1 22l8-6 6 5 5-4 15 10" stroke="#c5c5c7" strokeWidth="1.5" strokeLinecap="round" strokeLinejoin="round" fill="none" />
          </svg>
        </div>
        {/* Content */}
        <div style={{ flex: 1, minWidth: 0, display: 'flex', flexDirection: 'column', gap: 4 }}>
          <div style={{ fontSize: 13, fontWeight: 600, color: '#9a5d00' }}>[G#]. Unit [#]</div>
          <div style={{ fontSize: 13, color: '#6d6d6f', fontWeight: 400 }}>Topic Title</div>
          <div style={{ fontSize: 18, fontWeight: 700, color: '#1d1d1f', lineHeight: 1.2 }}>{title}</div>
        </div>
      </div>
      <div style={{ textAlign: 'center', padding: 12 }}>
        <button style={{ appearance: 'none', background: 'none', border: 'none', cursor: 'pointer', fontSize: 15, fontWeight: 600, color: '#1d1d1f', display: 'flex', alignItems: 'center', justifyContent: 'center', gap: 6, margin: '0 auto' }}>
          Assign level {level} <Ico n="arrowR" size={16} stroke="#1d1d1f" sw={2.5} />
        </button>
      </div>
    </div>);

}

/* ── Side panel ──────────────────────────────────────────────────────── */
function SidePanel({ row, onClose, onPrev, onNext, idx, total }) {
  const b = row?.band ? BAND[row.band] : null;
  const open = !!(row && b);
  return (
    <>
      <div onClick={onClose} style={{ position: 'fixed', inset: 0, background: 'rgba(29,29,31,.18)', zIndex: 100, opacity: open ? 1 : 0, pointerEvents: open ? 'auto' : 'none', transition: 'opacity .22s' }} />
      <aside style={{ position: 'fixed', top: 0, right: 0, bottom: 0, width: 420, background: '#fff', zIndex: 101, boxShadow: '-4px 0 40px rgba(29,29,31,.12)', transform: open ? 'translateX(0)' : 'translateX(100%)', transition: 'transform .26s cubic-bezier(.4,0,.2,1)', display: 'flex', flexDirection: 'column' }}>
        {open && <>
          {/* Header — meta row + nav only, fits 64px */}
          <div style={{ padding: '0 24px', display: 'flex', alignItems: 'center', gap: 12, justifyContent: 'space-between', height: '64px', flexShrink: 0 }}>
            <div style={{ flex: 1 }}><SubjectUnitLabel subj={row.subj} unit={row.unit} level={row.lv} /></div>
            <div style={{ display: 'flex', alignItems: 'center', gap: 4, flexShrink: 0 }}>
              <button onClick={onPrev} disabled={!onPrev} style={{ width: 32, height: 32, borderRadius: 8, background: '#f4f4f6', display: 'flex', alignItems: 'center', justifyContent: 'center', cursor: onPrev ? 'pointer' : 'default', border: 'none', opacity: onPrev ? 1 : 0.35 }}>
                <Ico n="arrowUp" size={15} stroke="#49494b" sw={2.5} />
              </button>
              <button onClick={onNext} disabled={!onNext} style={{ width: 32, height: 32, borderRadius: 8, background: '#f4f4f6', display: 'flex', alignItems: 'center', justifyContent: 'center', cursor: onNext ? 'pointer' : 'default', border: 'none', opacity: onNext ? 1 : 0.35 }}>
                <Ico n="arrowDown" size={15} stroke="#49494b" sw={2.5} />
              </button>
              <button onClick={onClose} style={{ width: 32, height: 32, borderRadius: 8, background: '#f4f4f6', display: 'flex', alignItems: 'center', justifyContent: 'center', cursor: 'pointer', flexShrink: 0, border: 'none' }}>
                <Ico n="x" size={15} stroke="#49494b" sw={2.5} />
              </button>
            </div>
          </div>

          <div style={{ flex: 1, overflowY: 'auto', padding: "2px 24px 28px" }}>
            {/* Assignment name */}
            <div style={{ fontSize: 20, fontWeight: 700, color: '#1d1d1f', lineHeight: 1.3, marginBottom: 20 }}>{row.name}</div>
            {/* Result section — full width with divider */}
            <section style={{ marginBottom: 20, paddingBottom: 20, borderBottom: '1px solid #e8e8ea', marginLeft: -24, marginRight: -24, paddingLeft: 24, paddingRight: 24 }}>
              <div style={{ display: 'flex', justifyContent: 'space-between', marginBottom: 14, fontSize: 11, fontWeight: 700, color: '#9a9a9c', letterSpacing: '.05em' }}>
                <div><span style={{ color: '#6d6d6f', fontWeight: 500 }}>Date available</span><br /><span style={{ color: '#1d1d1f', fontWeight: 600, marginTop: 2, display: 'block', fontSize: "14px", letterSpacing: "0px" }}>Dec 1, 2025</span></div>
                <div style={{ textAlign: 'right' }}><span style={{ color: '#6d6d6f', fontWeight: 500 }}>Date completed</span><br /><span style={{ color: '#1d1d1f', fontWeight: 600, marginTop: 2, display: 'block', fontSize: "14px", letterSpacing: "0px" }}>{row.date}</span></div>
              </div>
              
              <div style={{ fontSize: 13, fontWeight: 600, color: '#6d6d6f', marginBottom: 14 }}>Level {row.lv}</div>

              {/* Score and bar in horizontal layout — bar left, score right */}
              <div style={{ display: 'flex', gap: 12, marginBottom: 8, alignItems: 'center' }}>
                <div style={{ flex: 1 }}>
                  <AnnotatedBar sc={row.sc} band={row.band} subj={row.subj} />
                </div>
                <div style={{ fontWeight: 800, color: b.fg, letterSpacing: '-.02em', lineHeight: 1, flexShrink: 0, fontSize: "24px" }}>{row.sc}%</div>
              </div>

              {/* Band and threshold together at bottom */}
              <div style={{ display: 'flex', justifyContent: 'space-between', alignItems: 'flex-end', paddingTop: 6 }}>
                <div>
                  <BandPill band={row.band} sm={true} />
                </div>
                <div style={{ textAlign: 'right' }}>
                  <div style={{ display: 'flex', alignItems: 'baseline', gap: 6 }}>
                    <span style={{ fontSize: 10.5, fontWeight: 600, color: '#9a9a9c' }}>Math threshold</span>
                    <span style={{ fontWeight: 800, color: b.fg, fontSize: "11px" }}>{THRESHOLDS[row.band]?.[row.subj]}</span>
                  </div>
                </div>
              </div>
            </section>

            {/* Next step — band & level conditional */}
            <NextStepSection row={row} />
          </div>
        </>}
      </aside>
    </>);

}

/* ── App ─────────────────────────────────────────────────────────────── */
function App() {
  const [t, setTweak] = useTweaks(TWEAK_DEFAULTS);
  const [view, setView] = React.useState('Units');
  const [collapsed, setCollapsed] = React.useState(false);

  // Density multiplier for padding/gaps
  const densityMult = { compact: 0.75, regular: 1, spacious: 1.35 };
  const dm = densityMult[t.density];

  // Color mood: shift accent color
  const colorMood = { default: '#5a58ff', warm: '#d97757', cool: '#0066cc' };
  const accentColor = colorMood[t.colorMood];

  // Border style: radius and stroke weight
  const borderStyle = { sharp: { r: 4, sw: 1.5 }, soft: { r: 8, sw: 1 }, minimal: { r: 0, sw: 0.5 } };
  const bs = borderStyle[t.borderStyle];

  const subjects = {};
  ROWS.forEach((r) => {
    subjects[r.subj] = subjects[r.subj] || {};
    (subjects[r.subj][r.unit] = subjects[r.subj][r.unit] || []).push(r);
  });
  const subjOrder = ['Math', 'ELA'].filter((s) => subjects[s]);
  const onScroll = (e) => {
    const st = e.currentTarget.scrollTop;
    setCollapsed((c) => st > 48 ? true : st < 12 ? false : c);
  };
  return (
    <div style={{ display: 'flex', height: '100vh', overflow: 'hidden', fontFamily: "'Figtree',-apple-system,sans-serif" }}>
      <NavRail />
      <div style={{ flex: 1, display: 'flex', flexDirection: 'column', overflow: 'hidden', background: '#f4f4f6' }}>
        <Header student={PROFILE_STUDENT} rows={ROWS} onView={() => {}} collapsed={collapsed} densityMult={dm} accentColor={accentColor} borderStyle={bs} />
        <div onScroll={onScroll} style={{ flex: 1, overflow: 'auto', padding: `${24 * dm}px ${32 * dm}px ${48 * dm}px`, margin: "1px" }}>
          <div>
            <div style={{ display: 'flex', alignItems: 'center', gap: 12 * dm, marginBottom: 28 * dm }}>
              <SegmentToggle options={['Units', 'Domains']} active={view} onChange={setView} />
              <FilterPill label="All subjects" />
            </div>
            {subjOrder.map((s, i) =>
            <SubjectSection key={s} subj={s} units={subjects[s]} openFirst={i === 0} densityMult={dm} accentColor={accentColor} borderStyle={bs} />
            )}
          </div>
        </div>
      </div>
      <TweaksPanel>
        <TweakSection label="Layout" />
        <TweakRadio label="Density" value={t.density}
        options={['compact', 'regular', 'spacious']}
        onChange={(v) => setTweak('density', v)} />
        <TweakSection label="Visual" />
        <TweakRadio label="Color mood" value={t.colorMood}
        options={['default', 'warm', 'cool']}
        onChange={(v) => setTweak('colorMood', v)} />
        <TweakRadio label="Borders" value={t.borderStyle}
        options={['sharp', 'soft', 'minimal']}
        onChange={(v) => setTweak('borderStyle', v)} />
      </TweaksPanel>
    </div>);

}

ReactDOM.createRoot(document.getElementById('root')).render(<App />);
</script>
</body>
