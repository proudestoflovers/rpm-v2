/* Deterministic helpers */
function studentsFor(aid) {
  let h = 0;
  for (let i = 0; i < aid.length; i++) h = Math.imul(31, h) + aid.charCodeAt(i) | 0;
  const seed = h >>> 0;
  let r = seed;
  r = ((r * 1664525) + 1013904223) >>> 0;
  const n = 3 + (r % 4);
  const arr = [...ROSTER_STUDENTS];
  let s2 = seed;
  for (let i = arr.length - 1; i > 0; i--) {
    s2 = ((s2 * 1664525) + 1013904223) >>> 0;
    const j = s2 % (i + 1);
    [arr[i], arr[j]] = [arr[j], arr[i]];
  }
  return arr.slice(0, n).sort((a, b) => a.name.localeCompare(b.name));
}

function onlineStudentsFor(aid, paperStudents) {
  const paperIds = new Set(paperStudents.map(s => s.id));
  const pool = ROSTER_STUDENTS.filter(s => !paperIds.has(s.id));
  if (!pool.length) return [];
  let h = 0;
  for (let i = 0; i < aid.length; i++) h = Math.imul(53, h) + aid.charCodeAt(i) | 0;
  const seed = (h ^ 0xabcd1234) >>> 0;
  let r = seed;
  r = ((r * 1664525) + 1013904223) >>> 0;
  const n = Math.min(r % 3, pool.length);
  if (!n) return [];
  const arr = [...pool];
  let s2 = seed;
  for (let i = arr.length - 1; i > 0; i--) {
    s2 = ((s2 * 1664525) + 1013904223) >>> 0;
    const j = s2 % (i + 1);
    [arr[i], arr[j]] = [arr[j], arr[i]];
  }
  return arr.slice(0, n).sort((a, b) => a.name.localeCompare(b.name));
}

function onlineScore(s, aid) {
  let h = 0;
  const str = s.id + aid;
  for (let i = 0; i < str.length; i++) h = Math.imul(31, h) + str.charCodeAt(i) | 0;
  return Math.round(s.max * (0.8 + ((h >>> 0) % 21) * 0.01));
}

const UNIT_TOPICS = {
  1:'Exploring Patterns', 2:'Building Algebraic Thinking: Addition',
  3:'Expanding Addition', 4:'Building Algebraic Thinking: Subtraction',
  5:'Exploring Place Value', 6:'Exploring Time',
  7:'Exploring Shapes', 8:'Exploring Measurement and Data', 9:'Exploring Money',
};
function getTopicName(asgName) {
  const meta = getAssignmentMeta(asgName || '');
  return UNIT_TOPICS[meta.unit] || 'Grade 1';
}

function subjectDotColor(id) {
  const n = parseInt(id.slice(1));
  if (n <= 17)  return '#6dd0c0';
  if (n <= 121) return '#f5c842';
  if (n <= 146) return '#87c4e8';
  if (n <= 178) return '#6dd0c0';
  return '#87c4e8';
}

function getAssignmentMeta(name) {
  if (/Money/.test(name))                                              return { unit:9, subject:'math' };
  if (/Measurement|Taller|Longer|Non-Standard/.test(name))             return { unit:8, subject:'sci'  };
  if (/Shape|2D|3D|Attribute|Divide/.test(name))                       return { unit:7, subject:'math' };
  if (/Time|Calendar|Clock|AM\/PM|Day/.test(name))                    return { unit:6, subject:'ss'   };
  if (/Place Value|Digit|Tens|Compare Num/.test(name))                 return { unit:5, subject:'math' };
  if (/Subtraction|Backward/.test(name))                              return { unit:4, subject:'math' };
  if (/Word Problem|Expanding|Unknowns to 20|within 20/.test(name))   return { unit:3, subject:'ela'  };
  if (/Addition|Algebraic|Equal Sides|Commutative|Associative|Identity/.test(name)) return { unit:2, subject:'math' };
  return { unit:1, subject:'math' };
}

/* ── Assignment sidebar ───────────────────────────────────────── */
function AssignmentSidebar({ selected, scores, onSelect, filter, onFilter }) {
  const [sidebarW, setSidebarW] = React.useState(360);
  const dragging = React.useRef(false);
  const startX = React.useRef(0);
  const startW = React.useRef(0);

  React.useEffect(() => {
    function onMove(e) {
      if (!dragging.current) return;
      const delta = e.clientX - startX.current;
      setSidebarW(Math.max(200, Math.min(560, startW.current + delta)));
    }
    function onUp() {
      if (!dragging.current) return;
      dragging.current = false;
      document.body.style.cursor = '';
      document.body.style.userSelect = '';
    }
    window.addEventListener('mousemove', onMove);
    window.addEventListener('mouseup', onUp);
    return () => {window.removeEventListener('mousemove', onMove);window.removeEventListener('mouseup', onUp);};
  }, []);

  function onDragHandleDown(e) {
    e.preventDefault();
    dragging.current = true;
    startX.current = e.clientX;
    startW.current = sidebarW;
    document.body.style.cursor = 'col-resize';
    document.body.style.userSelect = 'none';
  }
  function rosterDone(aid) {
    return studentsFor(aid).every((s) => {
      const v = scores[s.id + '|' + aid];
      return v != null && v !== '';
    });
  }
  function rosterCount(aid) {
    return studentsFor(aid).filter((s) => {
      const v = scores[s.id + '|' + aid];
      return v != null && v !== '';
    }).length;
  }

  const listRef = React.useRef(null);
  React.useEffect(() => {
    const el = listRef.current?.querySelector('[data-selected="true"]');
    if (!el || !listRef.current) return;
    const top = el.offsetTop;
    const bot = top + el.offsetHeight;
    const cTop = listRef.current.scrollTop;
    const cBot = cTop + listRef.current.offsetHeight;
    if (top < cTop) listRef.current.scrollTop = top - 8;else
    if (bot > cBot) listRef.current.scrollTop = bot - listRef.current.offsetHeight + 8;
  }, [selected]);

  const visible = filter ? (a) => a.name.toLowerCase().includes(filter.toLowerCase()) :
  ASSIGNMENTS;

  return (
    <div style={{ width: sidebarW, flexShrink: 0, display: 'flex', flexDirection: 'column', position: 'relative', background: '#fff', height: '100%', overflow: 'hidden' }}>
      {/* Drag handle */}
      <div onMouseDown={onDragHandleDown}
      style={{ position: 'absolute', right: 0, top: 0, bottom: 0, width: 4, cursor: 'col-resize', zIndex: 10,
        background: 'transparent', transition: 'background .15s' }}
      onMouseEnter={(e) => e.currentTarget.style.background = 'rgba(90,88,255,0.25)'}
      onMouseLeave={(e) => e.currentTarget.style.background = 'transparent'} />
      
      {/* Right border */}
      <div style={{ position: 'absolute', right: 0, top: 0, bottom: 0, width: 1, background: '#e1e1e3', pointerEvents: 'none' }} />
      <div style={{ padding: '14px 12px 10px' }}>
        <div style={{ display: 'flex', alignItems: 'center', gap: 8, background: '#f4f4f6', borderRadius: 10, padding: '8px 12px' }}>
          <RRIcon name="search" size={15} color="#6d6d6f" />
          <input value={filter} onChange={(e) => onFilter(e.target.value)}
          placeholder="Search assignments"
          style={{ flex: 1, border: 'none', background: 'transparent', fontSize: 14, color: '#1d1d1f', outline: 'none' }} />
          {filter &&
          <button onClick={() => onFilter('')} style={{ border: 'none', background: 'transparent', cursor: 'pointer', color: '#6d6d6f', padding: 0, display: 'flex' }}>
              <RRIcon name="x" size={14} />
            </button>
          }
        </div>
      </div>
      <div ref={listRef} style={{ flex: 1, overflowY: 'auto', padding: '0 8px 16px' }}>
        {visible.length === 0 &&
        <div style={{ padding: '20px 12px', fontSize: 14, color: '#6d6d6f', textAlign: 'center' }}>No results</div>
        }
        {visible.map((a) => {
          const active = a.id === selected;
          const meta = getAssignmentMeta(a.name);
          const done = rosterDone(a.id);
          const cnt = rosterCount(a.id);
          const tot = studentsFor(a.id).length;
          return (
            <div key={a.id}
            data-selected={active}
            onClick={() => onSelect(a.id)}
            onMouseEnter={(e) => {if (!active) e.currentTarget.style.background = '#fafafa';}}
            onMouseLeave={(e) => {if (!active) e.currentTarget.style.background = 'transparent';}}
            style={{ display: 'flex', alignItems: 'center', gap: 10, padding: '10px 12px',
              cursor: 'pointer', position: 'relative',
              borderBottom: '1px solid #f0f0f2',
              background: active ? '#f8f8fe' : 'transparent',
              transition: 'background .1s' }}>
              {active && <span style={{ position: 'absolute', left: 0, top: 0, bottom: 0, width: 3, background: '#5a58ff', borderRadius: '0 2px 2px 0' }} />}
              <SubjectBadge subject={meta.subject} size={32} />
              <span style={{ flex: 1, fontSize: 15, lineHeight: 1.4, minWidth: 0, overflow: 'hidden', textOverflow: 'ellipsis', whiteSpace: 'nowrap' }}>
                <span style={{ color: (SUBJECT_CFG[meta.subject] || SUBJECT_CFG.math).color, fontWeight: 700 }}>1. Unit {meta.unit}.</span>
                {' '}<span style={{ color: '#1d1d1f', fontWeight: 400 }}>{a.name}</span>
              </span>
              {done ?
              <RRIcon name="check" size={13} color="#016a36" /> :
              cnt > 0 ?
              <span style={{ fontSize: 12, color: '#6d6d6f', flexShrink: 0 }}>{cnt}/{tot}</span> :
              null}
            </div>);

        })}
      </div>
    </div>);

}

/* ── Student row ──────────────────────────────────────────────── */
function StudentRow({ s, aid, scores, prompts, notes, expanded, onExpand, onScore, onPrompt, onNote, inputRef, onKeyDown, onChipEnter }) {
  const k = s.id + '|' + aid;
  const score = scores[k] ?? '';
  const prompt = prompts[k] || '';
  const note = notes[k] || '';
  const isAbs = score === 'Abs';
  const isOnline = !!s.online;

  return (
    <div style={{ background: '#fff', border: '1.5px solid', borderColor: expanded ? '#5a58ff' : '#e1e1e3', borderRadius: 16, overflow: 'hidden', transition: 'border-color .15s, box-shadow .15s', boxShadow: expanded ? '0 0 0 3px rgba(90,88,255,.1)' : '0px 2px 14px 0px rgba(29,29,31,0.03)' }}>
      <div style={{ display: 'flex', alignItems: 'center', gap: 14, background: expanded ? '#fafafe' : '#fff', padding: "14px 20px" }}>
        <StudentAvatar emoji={s.emoji} size={36} />
        <div style={{ flex: 1, display: 'flex', alignItems: 'center', gap: 8 }}>
          <span style={{ fontSize: 15, fontWeight: 600, color: '#1d1d1f' }}>{s.name}</span>
          <RRTag tone="default">Level {s.level}</RRTag>
          {isOnline && <RRTag tone="success">Online ✓</RRTag>}
        </div>
        <div style={{ display: 'flex', alignItems: 'center', gap: 6, flexShrink: 0 }}>
          {isOnline ?
          <span style={{ fontSize: 20, fontWeight: 700, color: '#6d6d6f' }}>{score}</span> :
          <input ref={inputRef}
          className={'rr-score-input' + (isAbs ? ' rr-abs' : '')}
          inputMode="numeric"
          value={isAbs ? 'Abs' : score}
          onFocus={() => onExpand(s.id)}
          onChange={(e) => onScore(k, e.target.value.replace(/[^0-9]/g, ''))}
          onKeyDown={(e) => {
            if (e.key === 'Tab') {
              e.preventDefault();
              const chips = document.querySelectorAll(`.rr-prompt-chip[data-sid="${s.id}"]`);
              if (chips[0]) chips[0].focus();
            } else {onKeyDown(e, k, s.id);}
          }}
          data-sid={s.id} />

          }
          <span style={{ fontSize: 14, fontWeight: 600, color: '#6d6d6f' }}>/{s.max}</span>
        </div>
      </div>

      {expanded &&
      <div style={{ padding: '12px 20px 16px', borderTop: '1px solid #efefef', background: '#fafafe' }}>
          <div style={{ fontSize: 11, fontWeight: 700, color: '#6d6d6f', textTransform: 'uppercase', letterSpacing: '0.06em', marginBottom: 8 }}>Prompting level</div>
          <div style={{ display: 'flex', flexWrap: 'wrap', gap: 6, marginBottom: 12 }}>
            {RR_PROMPTS.map((p) =>
          <button key={p}
          tabIndex={0}
          data-sid={s.id}
          className={'rr-prompt-chip' + (prompt === p ? ' rr-chip-on' : '')}
          onClick={() => onPrompt(k, prompt === p ? '' : p)}
          onKeyDown={(e) => {
            if (e.key === 'Enter' || e.key === ' ') {
              e.preventDefault();
              onPrompt(k, prompt === p ? '' : p);
              e.currentTarget.classList.add('rr-chip-pulse');
              e.currentTarget.addEventListener('animationend',
              () => e.currentTarget.classList.remove('rr-chip-pulse'), { once: true });
              if (onChipEnter) onChipEnter(s.id);
            } else if (e.key === 'ArrowRight') {
              e.preventDefault();
              const chips = [...document.querySelectorAll(`.rr-prompt-chip[data-sid="${s.id}"]`)];
              const i = chips.indexOf(e.currentTarget);
              if (chips[i + 1]) chips[i + 1].focus();
            } else if (e.key === 'ArrowLeft') {
              e.preventDefault();
              const chips = [...document.querySelectorAll(`.rr-prompt-chip[data-sid="${s.id}"]`)];
              const i = chips.indexOf(e.currentTarget);
              if (chips[i - 1]) chips[i - 1].focus();
            }
          }}>
            {p}</button>
          )}
          </div>
          {!isOnline && <div style={{ display: 'flex', alignItems: 'center', gap: 8 }}>
            <RRIcon name="pen" size={14} color="#6d6d6f" />
            <input className="rr-note-input" placeholder="Add a note…" value={note}
          onChange={(e) => onNote(k, e.target.value)} />
          </div>}
        </div>
      }
    </div>);

}

/* ── Roster Run screen ────────────────────────────────────────── */
function RosterRunScreen({ onDone }) {
  const [aid, setAid] = React.useState(ASSIGNMENTS[0].id);
  const [scores, setScores] = React.useState({});
  const [prompts, setPrompts] = React.useState({});
  const [notes, setNotes] = React.useState({});
  const [expanded, setExpanded] = React.useState(null);
  const [filter, setFilter] = React.useState('');
  const inputRefs = React.useRef({});

  // Stable refs for use inside effects
  const aidRef = React.useRef(aid);
  aidRef.current = aid;
  const paperStudentsRef = React.useRef([]);
  paperStudentsRef.current = paperStudents || [];
  const onlineStudentsRef = React.useRef([]);
  onlineStudentsRef.current = onlineStudents || [];

  function selectAssignment(newAid) {
    setAid(newAid);setExpanded(null);setFilter('');
  }
  const selectRef = React.useRef(selectAssignment);
  selectRef.current = selectAssignment;

  function focusStudent(id) {
    setExpanded(id);
    setTimeout(() => {
      const r = inputRefs.current[id];
      if (r) {r.focus();r.select();}
    }, 0);
  }

  function focusChips(sid) {
    setExpanded(sid);
    setTimeout(() => {
      const chips = document.querySelectorAll(`.rr-prompt-chip[data-sid="${sid}"]`);
      if (chips[0]) chips[0].focus();
    }, 80);
  }

  // Global ↑/↓ arrow key assignment navigation
  React.useEffect(() => {
    function onGlobalKey(e) {
      const tag = document.activeElement?.tagName;
      if (tag === 'INPUT' || tag === 'TEXTAREA') return;
      const idx = ASSIGNMENTS.findIndex((a) => a.id === aidRef.current);
      if (e.key === 'ArrowDown') {
        e.preventDefault();
        if (idx < ASSIGNMENTS.length - 1) selectRef.current(ASSIGNMENTS[idx + 1].id);
      } else if (e.key === 'ArrowUp') {
        e.preventDefault();
        if (idx > 0) selectRef.current(ASSIGNMENTS[idx - 1].id);
      }
    }
    window.addEventListener('keydown', onGlobalKey);
    return () => window.removeEventListener('keydown', onGlobalKey);
  }, []);

  function handleChipEnter(sid) {
    const paper = paperStudentsRef.current;
    const online = onlineStudentsRef.current;
    const pi = paper.findIndex((s) => s.id === sid);
    if (pi >= 0 && pi < paper.length - 1) {
      focusStudent(paper[pi + 1].id);
    } else if (pi === paper.length - 1 && online.length > 0) {
      focusChips(online[0].id);
    } else {
      const oi = online.findIndex((s) => s.id === sid);
      if (oi >= 0 && oi < online.length - 1) focusChips(online[oi + 1].id);
    }
  }

  const asg = ASSIGNMENTS.find((a) => a.id === aid);
  const paperStudents = React.useMemo(() => studentsFor(aid), [aid]);
  const onlineStudents = React.useMemo(
    () => onlineStudentsFor(aid, paperStudents).map((s) => ({ ...s, online: true })),
    [aid, paperStudents]
  );
  const allStudents = [...paperStudents, ...onlineStudents];

  React.useEffect(() => {
    const updates = {};
    onlineStudents.forEach((s) => {
      const k = s.id + '|' + aid;
      if (scores[k] == null) updates[k] = String(onlineScore(s, aid));
    });
    if (Object.keys(updates).length) setScores((prev) => ({ ...prev, ...updates }));
    setExpanded(paperStudents[0]?.id || null);
    setTimeout(() => {
      const ref = inputRefs.current[paperStudents[0]?.id];
      if (ref) {ref.focus();ref.select();}
    }, 80);
  }, [aid]);

  const doneCount = allStudents.filter((s) => {
    const v = scores[s.id + '|' + aid];
    return v != null && v !== '';
  }).length;

  function handleKeyDown(e, k, sid) {
    if (e.key === 'Enter') {
      e.preventDefault();
      const paper = paperStudentsRef.current;
      const idx = paper.findIndex((s) => s.id === sid);
      if (idx >= 0 && idx < paper.length - 1) {
        focusStudent(paper[idx + 1].id);
      } else if (idx === paper.length - 1 && onlineStudentsRef.current.length > 0) {
        focusChips(onlineStudentsRef.current[0].id);
      }
    } else if ((e.key === 'a' || e.key === 'A') && scores[k] === '') {
      e.preventDefault();
      setScores((prev) => ({ ...prev, [k]: 'Abs' }));
      const paper = paperStudentsRef.current;
      const idx = paper.findIndex((s) => s.id === sid);
      if (idx >= 0 && idx < paper.length - 1) focusStudent(paper[idx + 1].id);
    }
  }

  return (
    <div style={{ flex: 1, display: 'flex', flexDirection: 'column', height: '100%', overflow: 'hidden' }}>
      {/* Top bar */}
      <header style={{ background: '#fff', borderBottom: '1px solid #e1e1e3', padding: '0 32px', height: 60, flexShrink: 0, display: 'flex', alignItems: 'center', gap: 8 }}>
        <button onClick={onDone} style={{ border: 'none', background: 'transparent', cursor: 'pointer', display: 'flex', alignItems: 'center', gap: 4, color: '#6d6d6f', fontSize: 14, fontWeight: 500, padding: '4px 0' }}>
          <RRIcon name="chevLeft" size={16} />Students
        </button>
        <RRIcon name="chevRight" size={14} color="#c0c0c2" />
        <span style={{ fontSize: 16, fontWeight: 600, color: '#1d1d1f' }}>Enter scores</span>
        <div style={{ flex: 1 }} />
        <span style={{ fontSize: 13, fontWeight: 500, color: '#016a36', display: 'flex', alignItems: 'center', gap: 5 }}>
          <RRIcon name="check" size={14} color="#016a36" />All changes saved
        </span>
        <RRButton variant="brand" size="md" onClick={onDone}>Done</RRButton>
      </header>

      {/* Body */}

        <AssignmentSidebar selected={aid} scores={scores}
        onSelect={selectAssignment}

        {/* Scoring panel */}

                      1. Unit {meta.unit}
                    </span>
                  </div>

                  {/* Topic */}
                  <div style={{ fontSize: 14, color: '#6d6d6f', marginBottom: 4, fontWeight: 400 }}>
                    {topic}
                  </div>

                  {/* Lesson title */}
                  <div style={{ fontSize: 22, color: '#1d1d1f', lineHeight: 1.2, marginBottom: 'auto', fontWeight: "700" }}>
                    {asg?.name}
                  </div>

                  {/* Footer: progress + date + trash — single row */}
                  <div style={{ display: 'flex', alignItems: 'center', gap: 10, marginTop: 12, paddingTop: 12, borderTop: '1px solid #f0f0f2' }}>
                    <span style={{ fontSize: 13, color: '#9a9a9c', flexShrink: 0 }}>Available {asg?.available}</span>
                    <span style={{ color: '#d0d0d2', fontSize: 13 }}>·</span>
                    <div style={{ flex: 1, height: 5, borderRadius: 99, background: '#e1e1e3', overflow: 'hidden' }}>
                      <div style={{ width: `${Math.round(doneCount / Math.max(allStudents.length, 1) * 100)}%`, height: '100%', background: '#5a58ff', transition: 'width .3s' }} />
                    </div>
                    <span style={{ fontSize: 13, fontWeight: 600, color: '#6d6d6f', flexShrink: 0 }}>{doneCount}/{allStudents.length}</span>
                    <button title="Delete" style={{ border: 'none', background: 'transparent', cursor: 'pointer', padding: 4, display: 'flex', borderRadius: 8, color: '#b0b0b2', flexShrink: 0 }}>
                      <svg width={16} height={16} viewBox="0 0 24 24" fill="none" style={{ color: 'inherit' }}>
                        <g transform="translate(3, 3)">
                          <path d="M 6 -1 C 5.448 -1 5 -0.552 5 0 C 5 0.552 5.448 1 6 1 L 6 0 L 6 -1 Z M 12 1 C 12.552 1 13 0.552 13 0 C 13 -0.552 12.552 -1 12 -1 L 12 0 L 12 1 Z M 0 2 C -0.552 2 -1 2.448 -1 3 C -1 3.552 -0.552 4 0 4 L 0 3 L 0 2 Z M 18 4 C 18.552 4 19 3.552 19 3 C 19 2.448 18.552 2 18 2 L 18 3 L 18 4 Z M 16.998 3.067 C 17.035 2.515 16.618 2.039 16.067 2.002 C 15.515 1.965 15.039 2.382 15.002 2.933 L 16 3 L 16.998 3.067 Z M 15.299 13.519 L 14.301 13.453 L 14.301 13.453 L 15.299 13.519 Z M 2.701 13.519 L 1.704 13.586 L 1.704 13.586 L 2.701 13.519 Z M 2.998 2.933 C 2.961 2.382 2.485 1.965 1.933 2.002 C 1.382 2.039 0.965 2.515 1.002 3.067 L 2 3 L 2.998 2.933 Z M 4.498 17.7 L 4.062 18.6 L 4.062 18.6 L 4.498 17.7 Z M 3.2 16.485 L 4.069 15.99 L 4.069 15.99 L 3.2 16.485 Z M 14.8 16.485 L 15.669 16.98 L 15.669 16.98 L 14.8 16.485 Z M 13.502 17.7 L 13.938 18.6 L 13.938 18.6 L 13.502 17.7 Z M 6 0 L 6 1 L 12 1 L 12 0 L 12 -1 L 6 -1 L 6 0 Z M 0 3 L 0 4 L 18 4 L 18 3 L 18 2 L 0 2 L 0 3 Z M 16 3 L 15.002 2.933 L 14.301 13.453 L 15.299 13.519 L 16.296 13.586 L 16.998 3.067 L 16 3 Z M 10.509 18 L 10.509 17 L 7.491 17 L 7.491 18 L 7.491 19 L 10.509 19 L 10.509 18 Z M 2.701 13.519 L 3.699 13.453 L 2.998 2.933 L 2 3 L 1.002 3.067 L 1.704 13.586 L 2.701 13.519 Z M 7.491 18 L 7.491 17 C 6.684 17 6.137 16.999 5.713 16.966 C 5.301 16.933 5.087 16.874 4.934 16.8 L 4.498 17.7 L 4.062 18.6 C 4.53 18.826 5.021 18.917 5.555 18.959 C 6.076 19.001 6.716 19 7.491 19 L 7.491 18 Z M 2.701 13.519 L 1.704 13.586 C 1.755 14.359 1.797 14.997 1.873 15.515 C 1.951 16.045 2.074 16.529 2.331 16.98 L 3.2 16.485 L 4.069 15.99 C 3.985 15.843 3.912 15.633 3.852 15.224 C 3.79 14.803 3.753 14.258 3.699 13.453 L 2.701 13.519 Z M 4.498 17.7 L 4.934 16.8 C 4.571 16.624 4.269 16.341 4.069 15.99 L 3.2 16.485 L 2.331 16.98 C 2.731 17.682 3.335 18.247 4.062 18.6 L 4.498 17.7 Z M 15.299 13.519 L 14.301 13.453 C 14.247 14.258 14.21 14.803 14.148 15.224 C 14.088 15.633 14.015 15.843 13.931 15.99 L 14.8 16.485 L 15.669 16.98 C 15.926 16.529 16.049 16.045 16.127 15.515 C 16.203 14.997 16.245 14.359 16.296 13.586 L 15.299 13.519 Z M 10.509 18 L 10.509 19 C 11.284 19 11.924 19.001 12.445 18.959 C 12.979 18.917 13.47 18.826 13.938 18.6 L 13.502 17.7 L 13.066 16.8 C 12.913 16.874 12.699 16.933 12.287 16.966 C 11.863 16.999 11.316 17 10.509 17 L 10.509 18 Z M 14.8 16.485 L 13.931 15.99 C 13.731 16.341 13.429 16.624 13.066 16.8 L 13.502 17.7 L 13.938 18.6 C 14.665 18.247 15.269 17.682 15.669 16.98 L 14.8 16.485 Z" fill="currentColor" fillRule="nonzero" />
                        </g>
                      </svg>
                    </button>
                  </div>
                </div>
              </div>);

            })()}

          </div>{/* end header wrapper */}

          {/* Student rows + hints — padded */}
          <div style={{ flex: 1, padding: "14px 32px 0px" }}>
            <div style={{ display: 'flex', flexDirection: 'column', gap: 10 }}>
            {paperStudents.map((s) =>
              <StudentRow key={s.id} s={s} aid={aid}
              scores={scores} prompts={prompts} notes={notes}
              expanded={expanded === s.id}
              onExpand={setExpanded}
              onScore={(k, v) => setScores((p) => ({ ...p, [k]: v }))}
              onPrompt={(k, v) => setPrompts((p) => ({ ...p, [k]: v }))}
              onNote={(k, v) => setNotes((p) => ({ ...p, [k]: v }))}
              inputRef={(el) => inputRefs.current[s.id] = el}
              onKeyDown={handleKeyDown}
              onChipEnter={handleChipEnter} />
              )}

            {onlineStudents.length > 0 &&
              <>
                <div style={{ display: 'flex', alignItems: 'center', gap: 12, margin: '4px 0' }}>
                  <div style={{ flex: 1, height: 1, background: '#e1e1e3' }} />
                  <span style={{ fontSize: 12, fontWeight: 500, color: '#6d6d6f', whiteSpace: 'nowrap' }}>Completed online ({onlineStudents.length})</span>
                  <div style={{ flex: 1, height: 1, background: '#e1e1e3' }} />
                </div>
                {onlineStudents.map((s) =>
                <StudentRow key={s.id} s={s} aid={aid}
                scores={scores} prompts={prompts} notes={notes}
                expanded={false} onExpand={() => {}}
                onScore={() => {}} onPrompt={() => {}} onNote={() => {}}
                inputRef={() => {}} onKeyDown={() => {}} onChipEnter={handleChipEnter} />
                )}
              </>
              }
            </div>{/* end rows wrapper */}

            {/* Keyboard hints */}
            <div style={{ display: 'flex', gap: 16, marginTop: 20, fontSize: 13, color: '#9a9a9c' }}>
              <span><kbd style={{ background: '#fff', border: '1px solid #e1e1e3', borderRadius: 6, padding: '2px 7px', fontFamily: 'inherit', fontSize: 12 }}>Enter</kbd> next student</span>
              <span><kbd style={{ background: '#fff', border: '1px solid #e1e1e3', borderRadius: 6, padding: '2px 7px', fontFamily: 'inherit', fontSize: 12 }}>A</kbd> mark absent</span>
              <span>· Autosaves</span>
            </div>
          </div>
        </div>
      </div>
    </div>);

}

/* ── Root App ─────────────────────────────────────────────────── */
function App() {
  const [screen, setScreen] = React.useState('students');
  return (
    <div style={{ display: 'flex', width: '100vw', height: '100vh', overflow: 'hidden', background: '#f4f4f6' }}>
      <RRAppRail active="users" />
      <div className="rr-screen" key={screen} style={{ flex: 1, overflow: 'hidden', display: 'flex' }}>
        {screen === 'students' ?
        <StudentsScreen onAddScores={() => setScreen('roster')} /> :
        <RosterRunScreen onDone={() => setScreen('students')} />}
      </div>
    </div>);

}

ReactDOM.createRoot(document.getElementById('root')).render(<App />);
</script>
</body>
</html>
