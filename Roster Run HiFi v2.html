/* Deterministic helpers */
function studentsFor(aid) {
  let h = 0;
  for (let i = 0; i < aid.length; i++) h = Math.imul(31, h) + aid.charCodeAt(i) | 0;
  const seed = h >>> 0;
  let r = seed;
  r = ((r * 1664525) + 1013904223) >>> 0;
  const n = 3 + (r % 4);
  const arr = [...ROSTER_STUDENTS];
  let s2 = seed;
  for (let i = arr.length - 1; i > 0; i--) {
    s2 = ((s2 * 1664525) + 1013904223) >>> 0;
    const j = s2 % (i + 1);
    [arr[i], arr[j]] = [arr[j], arr[i]];
  }
  return arr.slice(0, n).sort((a, b) => a.name.localeCompare(b.name));
}

function onlineStudentsFor(aid, paperStudents) {
  const paperIds = new Set(paperStudents.map(s => s.id));
  const pool = ROSTER_STUDENTS.filter(s => !paperIds.has(s.id));
  if (!pool.length) return [];
  let h = 0;
  for (let i = 0; i < aid.length; i++) h = Math.imul(53, h) + aid.charCodeAt(i) | 0;
  const seed = (h ^ 0xabcd1234) >>> 0;
  let r = seed;
  r = ((r * 1664525) + 1013904223) >>> 0;
  const n = Math.min(r % 3, pool.length);
  if (!n) return [];
  const arr = [...pool];
  let s2 = seed;
  for (let i = arr.length - 1; i > 0; i--) {
    s2 = ((s2 * 1664525) + 1013904223) >>> 0;
    const j = s2 % (i + 1);
    [arr[i], arr[j]] = [arr[j], arr[i]];
  }
  return arr.slice(0, n).sort((a, b) => a.name.localeCompare(b.name));
}

function onlineScore(s, aid) {
  let h = 0;
  const str = s.id + aid;
  for (let i = 0; i < str.length; i++) h = Math.imul(31, h) + str.charCodeAt(i) | 0;
  return Math.round(s.max * (0.8 + ((h >>> 0) % 21) * 0.01));
}

function getTopicName(asgName) {
  const meta = getAssignmentMeta(asgName || '');

}

function subjectDotColor(id) {
  const n = parseInt(id.slice(1));
  if (n <= 17)  return '#6dd0c0';
  if (n <= 121) return '#f5c842';
  if (n <= 146) return '#87c4e8';
  if (n <= 178) return '#6dd0c0';
  return '#87c4e8';
}

function getAssignmentMeta(name) {
  if (/Money/.test(name))                                              return { unit:9, subject:'math' };
  if (/Measurement|Taller|Longer|Non-Standard/.test(name))             return { unit:8, subject:'sci'  };
  if (/Shape|2D|3D|Attribute|Divide/.test(name))                       return { unit:7, subject:'math' };
  if (/Time|Calendar|Clock|AM\/PM|Day/.test(name))                    return { unit:6, subject:'ss'   };
  if (/Place Value|Digit|Tens|Compare Num/.test(name))                 return { unit:5, subject:'math' };
  if (/Subtraction|Backward/.test(name))                              return { unit:4, subject:'math' };
  if (/Word Problem|Expanding|Unknowns to 20|within 20/.test(name))   return { unit:3, subject:'ela'  };
  if (/Addition|Algebraic|Equal Sides|Commutative|Associative|Identity/.test(name)) return { unit:2, subject:'math' };
  return { unit:1, subject:'math' };
}

function ScaledFrame({ children }) {
  const [state, setState] = React.useState({ scale: 1, x: 0, y: 0 });
  React.useEffect(() => {
    function update() {
      const scale = Math.min(window.innerWidth / 1512, window.innerHeight / 883);
      setState({
        scale,
        x: Math.max(0, (window.innerWidth - 1512 * scale) / 2),
        y: Math.max(0, (window.innerHeight - 883 * scale) / 2)
      });
    }
    update();
    window.addEventListener('resize', update);
    return () => window.removeEventListener('resize', update);
  }, []);
  return (
    <div style={{ width: '100vw', height: '100vh', background: '#0e0e0f', overflow: 'hidden', position: 'relative' }}>
      <div style={{
        position: 'absolute',
        left: state.x, top: state.y,
        width: 1512, height: 883,
        transformOrigin: 'top left',
        transform: `scale(${state.scale})`
      }}>
        {children}
      </div>
    </div>);

}

function TrendIndicator({ trend }) {
  const map = {

    down:   { color:'#d15e00' },

  const t = map[trend] || map.steady;
  const labels = { up:'Improving', steady:'Steady', down:'Slipping' };
  const icons = {
    up:     <path d="M 6 14 L 10 9 L 13 12 L 18 6" />,
    steady: <line x1="6" y1="12" x2="18" y2="12" />,
    down:   <path d="M 6 6 L 10 11 L 13 8 L 18 14" />
  };
  return (
    <div style={{ display:'flex', alignItems:'center', gap:2, color:t.color }}>

<script type="text/babel">
/* rr-roster.jsx — Roster Run scoring screen */

const SUBJ_COLOR = { math:'#f5c842', sci:'#6dd0c0', ela:'#c4a0e8', ss:'#87c4e8' };
const RR_PROMPTS = ["Independent","Verbal","Gestural","Physical","Hand-over-hand"];

function subjDot(aid) {
  const color = SUBJ_COLOR[subjectOf(aid)] || '#e1e1e3';
  return <span style={{ width:10,height:10,borderRadius:'50%',background:color,flexShrink:0,display:'inline-block' }} />;
}

// ─── Assignment sidebar ───────────────────────────────────────────────────────
function AssignmentSidebar({ selected, scores, onSelect, filter, onFilter }) {
  const listRef = React.useRef(null);

  function rosterDone(aid) {
    const roster = studentsFor(aid);
    return roster.length > 0 && roster.every(s => {
      const v = scores[s.id + '|' + aid];
      return v != null && v !== '';
    });
  }
  function rosterCount(aid) {
    return studentsFor(aid).filter(s => scores[s.id + '|' + aid] != null && scores[s.id + '|' + aid] !== '').length;
  }

  const visible = filter
    ? ASSIGNMENTS.filter(a => a.name.toLowerCase().includes(filter.toLowerCase()))
    : ASSIGNMENTS;

  // Scroll active item into view on mount / selection change
  React.useEffect(() => {
    if (!listRef.current) return;
    const el = listRef.current.querySelector('[data-active="true"]');
    if (el) el.scrollIntoView({ block: 'nearest' });
  }, [selected]);

  return (
    <div style={{ width:272,flexShrink:0,display:'flex',flexDirection:'column',borderRight:'1px solid #e1e1e3',background:'#fff',height:'100%',overflow:'hidden' }}>
      {/* Search */}
      <div style={{ padding:'14px 12px 10px' }}>
        <div style={{ display:'flex',alignItems:'center',gap:8,background:'#f4f4f6',borderRadius:10,padding:'8px 12px' }}>
          <RRIcon name="search" size={15} color="#6d6d6f" />
          <input value={filter} onChange={e => onFilter(e.target.value)}
            placeholder="Search assignments"
            style={{ flex:1,border:'none',background:'transparent',font:'var(--eds-body-sm)',color:'#1d1d1f',outline:'none' }} />
          {filter && (
            <button onClick={() => onFilter('')} style={{ border:'none',background:'transparent',cursor:'pointer',color:'#6d6d6f',padding:0,display:'flex' }}>
              <RRIcon name="x" size={14} />
            </button>
          )}
        </div>
      </div>
      {/* List */}
      <div ref={listRef} style={{ flex:1,overflowY:'auto',padding:'0 8px 16px' }}>
        {visible.length === 0 && (
          <div style={{ padding:'20px 12px',font:'var(--eds-body-sm)',color:'#6d6d6f',textAlign:'center' }}>No results</div>
        )}
        {visible.map(a => {
          const active = a.id === selected;
          const done = rosterDone(a.id);
          const cnt = rosterCount(a.id);
          const tot = studentsFor(a.id).length;
          return (
            <div key={a.id} data-active={active}
              onClick={() => onSelect(a.id)}
              onMouseEnter={e => { if (!active) e.currentTarget.style.background = '#f4f4f6'; }}
              onMouseLeave={e => { if (!active) e.currentTarget.style.background = 'transparent'; }}
              style={{ display:'flex',alignItems:'center',gap:8,padding:'8px 10px',borderRadius:10,cursor:'pointer',background:active?'#eaeaff':'transparent',marginBottom:1,position:'relative',transition:'background .1s' }}>
              {active && <span style={{ position:'absolute',left:0,top:4,bottom:4,width:3,background:'#5a58ff',borderRadius:'0 3px 3px 0' }} />}
              {subjDot(a.id)}
              <span style={{ flex:1,font:'var(--eds-body-sm)',color:active?'#3d33cc':'#1d1d1f',lineHeight:1.4,minWidth:0,textWrap:'pretty' }}>{a.name}</span>
              {done
                ? <RRIcon name="check" size={13} color="#016a36" />
                : cnt > 0
                  ? <span style={{ font:'var(--eds-body-sm)',color:'#6d6d6f',flexShrink:0,fontSize:12.5 }}>{cnt}/{tot}</span>
                  : null}
            </div>
          );
        })}
      </div>
    </div>
  );
}

// ─── Student row ─────────────────────────────────────────────────────────────
function StudentRow({ s, aid, scores, prompts, notes, expanded, onExpand, onScore, onPrompt, onNote, inputRef, onKeyDown }) {
  const k = s.id + '|' + aid;
  const score = scores[k] ?? '';
  const prompt = prompts[k] || '';
  const note = notes[k] || '';
  const isAbs = score === 'Abs';
  const isOnline = !!s.online;

  return (
    <div style={{ background:'#fff',border:'1.5px solid',borderColor:expanded?'#5a58ff':'#e1e1e3',borderRadius:'var(--eds-radius-md)',overflow:'hidden',transition:'border-color .15s, box-shadow .15s',boxShadow:expanded?'0 0 0 3px rgba(90,88,255,.1)':'var(--eds-shadow-sm)' }}>
      <div style={{ display:'flex',alignItems:'center',gap:14,padding:'14px 20px',background:expanded?'#fafafe':'#fff' }}>
        <RRAvatar initials={s.init} accent={s.accent} size={36} />
        <div style={{ flex:1,display:'flex',alignItems:'center',gap:8,flexWrap:'wrap' }}>
          <span style={{ font:'var(--eds-title-default)',color:'#1d1d1f' }}>{s.name}</span>
          <RRTag tone="default">Level {s.level}</RRTag>
          {isOnline && <RRTag tone="success">Online ✓</RRTag>}
        </div>
        <div style={{ display:'flex',alignItems:'center',gap:6,flexShrink:0 }}>
          {isOnline
            ? <span style={{ fontFamily:"'Figtree',sans-serif",fontWeight:600,fontSize:20,color:'#6d6d6f' }}>{score}</span>
            : <input ref={inputRef}
                className={'rr-score-input' + (isAbs ? ' rr-abs' : '')}
                inputMode="numeric"
                value={isAbs ? 'Abs' : score}
                onFocus={() => onExpand(s.id)}
                onChange={e => onScore(k, e.target.value.replace(/[^0-9]/g, ''))}
                onKeyDown={e => onKeyDown(e, k, s.id)}
                data-sid={s.id}
              />
          }
          <span style={{ font:'var(--eds-title-sm)',color:'#6d6d6f' }}>/{s.max}</span>
        </div>
      </div>

      {expanded && !isOnline && (
        <div style={{ padding:'12px 20px 16px',borderTop:'1px solid #efefef',background:'#fafafe' }}>
          <div style={{ font:'var(--eds-body-sm)',color:'#6d6d6f',textTransform:'uppercase',letterSpacing:'0.05em',fontSize:11,marginBottom:8,fontWeight:600 }}>Prompting level</div>
          <div style={{ display:'flex',flexWrap:'wrap',gap:6,marginBottom:12 }}>
            {RR_PROMPTS.map(p => (
              <button key={p} className={'rr-prompt-chip' + (prompt === p ? ' rr-chip-on' : '')}
                onClick={() => onPrompt(k, prompt === p ? '' : p)}>{p}</button>
            ))}
          </div>
          <div style={{ display:'flex',alignItems:'center',gap:8 }}>
            <RRIcon name="pen" size={14} color="#6d6d6f" />

/* ── Assignment sidebar ───────────────────────────────────────── */
function AssignmentSidebar({ selected, scores, onSelect, filter, onFilter, removedIds }) {
  const [sidebarW, setSidebarW] = React.useState(360);
  const dragging = React.useRef(false);
  const startX = React.useRef(0);
  const startW = React.useRef(0);

  React.useEffect(() => {
    function onMove(e) {
      if (!dragging.current) return;
      const delta = e.clientX - startX.current;
      setSidebarW(Math.max(200, Math.min(560, startW.current + delta)));
    }
    function onUp() {
      if (!dragging.current) return;
      dragging.current = false;
      document.body.style.cursor = '';
      document.body.style.userSelect = '';
    }
    window.addEventListener('mousemove', onMove);
    window.addEventListener('mouseup', onUp);
    return () => {window.removeEventListener('mousemove', onMove);window.removeEventListener('mouseup', onUp);};
  }, []);

  function onDragHandleDown(e) {
    e.preventDefault();
    dragging.current = true;
    startX.current = e.clientX;
    startW.current = sidebarW;
    document.body.style.cursor = 'col-resize';
    document.body.style.userSelect = 'none';
  }
  function rosterDone(aid) {
    return studentsFor(aid).every((s) => {
      const v = scores[s.id + '|' + aid];
      return v != null && v !== '';
    });
  }
  function rosterCount(aid) {
    return studentsFor(aid).filter((s) => {
      const v = scores[s.id + '|' + aid];
      return v != null && v !== '';
    }).length;
  }

  const [visibleCount, setVisibleCount] = React.useState(30);
  const [filterOpen, setFilterOpen] = React.useState(false);
  const [subjectFilter, setSubjectFilter] = React.useState('');
  const [dateFilter, setDateFilter] = React.useState('');
  const [studentFilter, setStudentFilter] = React.useState([]);
  const [studentDropOpen, setStudentDropOpen] = React.useState(false);
  const studentDropRef = React.useRef(null);
  React.useEffect(() => {setVisibleCount(30);}, [filter, subjectFilter, dateFilter, studentFilter]);
  React.useEffect(() => {
    if (!studentDropOpen) return;
    function onOutside(e) {if (studentDropRef.current && !studentDropRef.current.contains(e.target)) setStudentDropOpen(false);}
    document.addEventListener('mousedown', onOutside);
    return () => document.removeEventListener('mousedown', onOutside);
  }, [studentDropOpen]);

  const listRef = React.useRef(null);
  React.useEffect(() => {
    const el = listRef.current?.querySelector('[data-selected="true"]');
    if (!el || !listRef.current) return;
    const top = el.offsetTop;
    const bot = top + el.offsetHeight;
    const cTop = listRef.current.scrollTop;
    const cBot = cTop + listRef.current.offsetHeight;
    if (top < cTop) listRef.current.scrollTop = top - 8;else
    if (bot > cBot) listRef.current.scrollTop = bot - listRef.current.offsetHeight + 8;
  }, [selected]);

  function parseAvail(str) {
    const ms = { Jan: 1, Feb: 2, Mar: 3, Apr: 4, May: 5, Jun: 6, Jul: 7, Aug: 8, Sep: 9, Oct: 10, Nov: 11, Dec: 12 };
    const [mon, day] = str.split(' ');
    const m = ms[mon];const d = parseInt(day);
    return new Date(m > 6 ? 2025 : 2026, m - 1, d);
  }
  const TODAY = new Date(2026, 5, 12);
  const filtered = ASSIGNMENTS.filter((a) => {
    if (removedIds && removedIds.has(a.id)) return false;
    if (filter && !a.name.toLowerCase().includes(filter.toLowerCase())) return false;
    if (subjectFilter) {const m = getAssignmentMeta(a.name);if (m.subject !== subjectFilter) return false;}
    if (dateFilter) {
      const avail = parseAvail(a.available);
      const days = { d7: 7, d30: 30, d90: 90 }[dateFilter];
      const cutoff = new Date(TODAY);cutoff.setDate(cutoff.getDate() - days);
      if (avail < cutoff || avail > TODAY) return false;
    }
    if (studentFilter.length > 0) {
      const sids = new Set(studentsFor(a.id).map((s) => s.id));
      if (!studentFilter.some((id) => sids.has(id))) return false;
    }
    return true;
  });
  const visible = filtered.slice(0, visibleCount);
  const hasMore = filtered.length > visibleCount;
  const filtersActive = !!(subjectFilter || dateFilter || studentFilter.length);

  return (

      <div onMouseDown={onDragHandleDown}

        background: 'transparent', transition: 'background .15s' }}
      onMouseEnter={(e) => e.currentTarget.style.background = 'rgba(90,88,255,0.25)'}
      onMouseLeave={(e) => e.currentTarget.style.background = 'transparent'} />
      
      {/* Right border */}

            <RRIcon name="search" size={15} color="#6d6d6f" />
            <input value={filter} onChange={(e) => onFilter(e.target.value)}

          <button

            onMouseLeave={(e) => {if (!filtersActive) {e.currentTarget.style.background = '#fff';e.currentTarget.style.borderColor = '#e1e1e3';}}}>
            
            <svg width={16} height={16} viewBox="0 0 24 24" fill="none" stroke={filtersActive ? '#5a58ff' : '#49494b'} strokeWidth={2} strokeLinecap="round" strokeLinejoin="round">
              <line x1="4" y1="6" x2="20" y2="6" /><line x1="8" y1="12" x2="16" y2="12" /><line x1="11" y1="18" x2="13" y2="18" />
            </svg>
            {filtersActive && <span style={{ position: 'absolute', top: -4, right: -4, width: 11, height: 11, borderRadius: '50%', background: '#5a58ff', border: '2px solid #fff' }} />}

        {filterOpen &&

              <span style={{ flex: 1, fontSize: 14, lineHeight: 1.4, minWidth: 0, overflow: 'hidden', textOverflow: 'ellipsis', whiteSpace: 'nowrap' }}>
                <span style={{ color: (SUBJECT_CFG[meta.subject] || SUBJECT_CFG.math).color, fontWeight: 700 }}>1. Unit {meta.unit}.</span>
                {' '}<span style={{ color: '#1d1d1f', fontWeight: 400 }}>{a.name}</span>
              </span>
              {done ?
              <RRIcon name="check" size={13} color="#016a36" /> :
              cnt > 0 ?
              <span style={{ fontSize: 12.5, color: '#6d6d6f', flexShrink: 0 }}>{cnt}/{tot}</span> :
              null}
            </div>);

        })}
        {hasMore &&
        <div style={{ padding: '12px 12px 4px', display: 'flex', justifyContent: 'center' }}>
            <RRButton variant="ghost" size="sm" onClick={() => setVisibleCount((c) => c + 30)}>
              Load more <span style={{ color: '#9a9a9c', fontWeight: 500, fontSize: "14px", letterSpacing: "0.1px" }}>({filtered.length - visibleCount})</span>
            </RRButton>
          </div>
        }
      </div>
    </div>);

}

/* Generic tag-select field: chips with a grouped dropdown + custom entry.
   Mirrors the Accommodations UI; reused for Prompt level. */
function TagSelectField({ label, presets, customPlaceholder = 'Custom…', addLabel = 'Add', recentItems = [] }) {
  const [selected, setSelected] = React.useState([]);
  const [open, setOpen] = React.useState(false);
  const [customInput, setCustomInput] = React.useState('');
  const [pos, setPos] = React.useState(null);
  const wrapRef = React.useRef(null);
  const triggerRef = React.useRef(null);
  const dropdownRef = React.useRef(null);
  const customRef = React.useRef(null);

  function computePos() {
    if (!triggerRef.current) return;
    const r = triggerRef.current.getBoundingClientRect();
    const margin = 8;
    const preferredMaxHeight = 320; // cap when there's room for it — dropdown shrinks to content below this
    const spaceBelow = window.innerHeight - r.bottom - margin;
    const spaceAbove = r.top - margin;
    const openUpward = spaceBelow < preferredMaxHeight && spaceAbove > spaceBelow;
    const available = openUpward ? spaceAbove : spaceBelow;
    const maxHeight = Math.min(preferredMaxHeight, Math.max(120, available));
    const width = r.width;
    let left = r.left;
    if (left + width > window.innerWidth - margin) left = window.innerWidth - margin - width;
    if (left < margin) left = margin;
    setPos({
      left,
      width,
      maxHeight,
      ...(openUpward
        ? { bottom: window.innerHeight - r.top + 6 }
        : { top: r.bottom + 6 }),
    });
  }

  React.useEffect(() => {
    if (!open) return;
    computePos();
    function close(e) {
      if (wrapRef.current && wrapRef.current.contains(e.target)) return;
      if (dropdownRef.current && dropdownRef.current.contains(e.target)) return;
      setOpen(false);
    }
    function onReposition() { computePos(); }
    document.addEventListener('mousedown', close);
    window.addEventListener('scroll', onReposition, true);
    window.addEventListener('resize', onReposition);
    return () => {
      document.removeEventListener('mousedown', close);
      window.removeEventListener('scroll', onReposition, true);
      window.removeEventListener('resize', onReposition);
    };
  }, [open]);

  function remove(item) { setSelected(prev => prev.filter(x => x !== item)); }

  function toggle(item) {
    setSelected(prev => prev.includes(item) ? prev.filter(x => x !== item) : [...prev, item]);
  }

  function addCustom() {
    const val = customInput.trim();
    if (!val || selected.includes(val)) return;
    setSelected(prev => [...prev, val]);
    setCustomInput('');
    if (customRef.current) customRef.current.focus();
  }

  const groups = [...new Set(presets.map(p => p.group))];
  const available = presets.filter(p => !selected.includes(p.label));
  const recentAvailable = recentItems.filter(item => !selected.includes(item));

  return (
    <div style={{ display: 'flex', flexDirection: 'column', gap: 6 }}>
      <span style={{ fontSize: 13, fontWeight: 600, color: '#1d1d1f' }}>{label}</span>
      <div ref={wrapRef} style={{ position: 'relative' }}>
        {/* Tag display + trigger */}
        <div ref={triggerRef} style={{ display: 'flex', flexWrap: 'wrap', alignItems: 'center', gap: 5, border: '1.5px solid #e1e1e3', borderRadius: 10, background: '#fff', padding: '7px 10px', minHeight: 40, cursor: 'text' }}
          onClick={() => setOpen(true)}>
          {selected.map(item => (
            <span key={item} style={{ display: 'inline-flex', alignItems: 'center', gap: 4, background: '#eaeaff', color: '#3d33cc', border: '1px solid #c8c6ff', borderRadius: 99, padding: '2px 8px 2px 10px', fontSize: 12.5, fontWeight: 600, whiteSpace: 'nowrap' }}>
              {item}
              <button onClick={(e) => { e.stopPropagation(); remove(item); }}
                style={{ border: 'none', background: 'transparent', padding: 0, cursor: 'pointer', display: 'flex', alignItems: 'center', color: '#7b78ee', lineHeight: 1 }}>
                <svg width={12} height={12} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth={2.5} strokeLinecap="round"><path d="M18 6 6 18"/><path d="m6 6 12 12"/></svg>
              </button>
            </span>
          ))}
          <button onClick={(e) => { e.stopPropagation(); setOpen(o => !o); }}
            style={{ border: '1px dashed #c0c0c2', borderRadius: 99, padding: '2px 8px', background: 'transparent', color: '#9a9a9c', fontSize: 12.5, fontWeight: 500, cursor: 'pointer', display: 'inline-flex', alignItems: 'center', gap: 4, whiteSpace: 'nowrap' }}>
            <svg width={11} height={11} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth={2.5} strokeLinecap="round"><path d="M12 5v14"/><path d="M5 12h14"/></svg>
            {addLabel}
          </button>
        </div>

        {/* Dropdown — portaled to <body> with fixed positioning so it can't be clipped by an ancestor's overflow:hidden, and repositions/flips to stay inside the viewport. Shrinks to content up to maxHeight, with the custom-entry row pinned outside the scrollable list so it's never scrolled out of view. */}
        {open && pos && ReactDOM.createPortal(
          <div ref={dropdownRef} style={{ position: 'fixed', left: pos.left, width: pos.width, top: pos.top, bottom: pos.bottom, maxHeight: pos.maxHeight, display: 'flex', flexDirection: 'column', background: '#fff', border: '1px solid #e1e1e3', borderRadius: 12, boxShadow: '0 8px 24px rgba(0,0,0,0.12)', zIndex: 200, overflow: 'hidden' }}>
            <div style={{ flex: '1 1 auto', minHeight: 0, overflowY: 'auto', padding: '8px 0' }}>
              {recentAvailable.length > 0 &&
              <div style={{ borderBottom: '1px solid #f0f0f2', marginBottom: 4, paddingBottom: 4 }}>
                  <div style={{ padding: '4px 14px 2px', fontSize: 11, fontWeight: 700, color: '#9a9a9c', textTransform: 'uppercase', letterSpacing: '0.06em' }}>Used previously</div>
                  {recentAvailable.map(item => (
                  <button key={'recent-' + item} onClick={() => toggle(item)}
                    style={{ display: 'flex', alignItems: 'center', width: '100%', padding: '8px 14px', border: 'none', background: 'transparent', font: '400 13px var(--eds-font-family, \'Figtree\', sans-serif)', color: '#1d1d1f', cursor: 'pointer', textAlign: 'left', gap: 8 }}
                    onMouseEnter={e => e.currentTarget.style.background = '#f4f4f6'}
                    onMouseLeave={e => e.currentTarget.style.background = 'transparent'}>
                      <svg width={13} height={13} viewBox="0 0 24 24" fill="none" stroke="#9a9a9c" strokeWidth={2} strokeLinecap="round" strokeLinejoin="round"><circle cx="12" cy="12" r="10"/><polyline points="12 6 12 12 16 14"/></svg>
                      {item}
                    </button>
                  ))}
                </div>
              }
              {available.map(p => (
                <button key={p.label} onClick={() => toggle(p.label)}
                  style={{ display: 'flex', alignItems: 'center', width: '100%', padding: '8px 14px', border: 'none', background: 'transparent', font: '400 13px var(--eds-font-family, \'Figtree\', sans-serif)', color: '#1d1d1f', cursor: 'pointer', textAlign: 'left', gap: 8 }}
                  onMouseEnter={e => e.currentTarget.style.background = '#f4f4f6'}
                  onMouseLeave={e => e.currentTarget.style.background = 'transparent'}>
                  {p.label}
                </button>
              ))}
            </div>
            {/* Custom input — pinned outside the scrollable area, always visible */}
            <div style={{ flex: '0 0 auto', borderTop: '1px solid #f0f0f2', padding: '8px 10px', display: 'flex', gap: 6, alignItems: 'center' }}>
              <input ref={customRef} value={customInput} onChange={e => setCustomInput(e.target.value)}
                onKeyDown={e => { if (e.key === 'Enter') { e.preventDefault(); addCustom(); } }}
                placeholder={customPlaceholder}
                style={{ flex: 1, border: 'none', outline: 'none', font: '400 13px var(--eds-font-family, \'Figtree\', sans-serif)', color: '#1d1d1f', background: 'transparent' }} />
              {customInput.trim() && (
                <button onClick={addCustom} style={{ border: 'none', background: '#5a58ff', color: '#fff', borderRadius: 99, padding: '4px 12px', font: '600 12px var(--eds-font-family, \'Figtree\', sans-serif)', cursor: 'pointer', whiteSpace: 'nowrap' }}>Add</button>
              )}
            </div>
          </div>,
          document.body
        )}
      </div>
    </div>
  );
}

function DatePickerField({ label, defaultDate }) {
  function parseAvailable(str) {
    if (!str) return new Date();
    const months = { Jan:1, Feb:2, Mar:3, Apr:4, May:5, Jun:6, Jul:7, Aug:8, Sep:9, Oct:10, Nov:11, Dec:12 };
    const [mon, day] = str.split(' ');
    const m = months[mon];
    if (!m) return new Date();
    const year = new Date().getFullYear();
    return new Date(year, m - 1, parseInt(day));
  }

  function formatDisplay(date) {
    if (!date) return '';
    const m = String(date.getMonth() + 1).padStart(2, '0');
    const d = String(date.getDate()).padStart(2, '0');
    const y = date.getFullYear();
    return `${m}/${d}/${y}`;
  }

  const defaultDate_obj = parseAvailable(defaultDate);
  const [selected, setSelected] = React.useState(defaultDate_obj);
  const [viewMonth, setViewMonth] = React.useState(new Date(defaultDate_obj));
  const [open, setOpen] = React.useState(false);
  const wrapRef = React.useRef(null);

  React.useEffect(() => {
    if (!open) return;
    function close(e) { if (wrapRef.current && !wrapRef.current.contains(e.target)) setOpen(false); }
    document.addEventListener('mousedown', close);
    return () => document.removeEventListener('mousedown', close);
  }, [open]);

  function getDaysInMonth(date) {
    return new Date(date.getFullYear(), date.getMonth() + 1, 0).getDate();
  }

  function getFirstDayOfMonth(date) {
    return new Date(date.getFullYear(), date.getMonth(), 1).getDay();
  }

  function pickDate(day) {
    const newDate = new Date(viewMonth.getFullYear(), viewMonth.getMonth(), day);
    setSelected(newDate);
    setOpen(false);
  }

  function prevMonth() {
    setViewMonth(new Date(viewMonth.getFullYear(), viewMonth.getMonth() - 1));
  }

  function nextMonth() {
    setViewMonth(new Date(viewMonth.getFullYear(), viewMonth.getMonth() + 1));
  }

  const daysInMonth = getDaysInMonth(viewMonth);
  const firstDay = getFirstDayOfMonth(viewMonth);
  const days = [];
  for (let i = 0; i < firstDay; i++) days.push(null);
  for (let i = 1; i <= daysInMonth; i++) days.push(i);

  const monthNames = ['January', 'February', 'March', 'April', 'May', 'June', 'July', 'August', 'September', 'October', 'November', 'December'];
  const monthYear = `${monthNames[viewMonth.getMonth()]} ${viewMonth.getFullYear()}`;

  return (
    <div ref={wrapRef} style={{ position: 'relative', display: 'flex', flexDirection: 'column', gap: 6 }}>
      <span style={{ fontSize: 13, fontWeight: 600, color: '#1d1d1f' }}>{label}</span>
      <div style={{ display: 'flex', alignItems: 'center', border: '1.5px solid #e1e1e3', borderRadius: 10, background: '#fff', padding: '0 12px', height: 40, cursor: 'pointer' }}
        onClick={() => setOpen(!open)}>
        <input type="text" placeholder="mm/dd/yyyy" value={formatDisplay(selected)} readOnly
          style={{ flex: 1, border: 'none', background: 'transparent', font: '400 14px var(--eds-font-family, \'Figtree\', sans-serif)', color: '#1d1d1f', outline: 'none', cursor: 'pointer', pointerEvents: 'none' }} />
        <svg width={16} height={16} viewBox="0 0 24 24" fill="none" stroke="#9a9a9c" strokeWidth={2} strokeLinecap="round" strokeLinejoin="round">
          <rect x="3" y="4" width="18" height="18" rx="2"/><line x1="16" y1="2" x2="16" y2="6"/><line x1="8" y1="2" x2="8" y2="6"/><line x1="3" y1="10" x2="21" y2="10"/>
        </svg>
      </div>

      {open && (
        <div style={{ position: 'absolute', top: 'calc(100% + 8px)', left: 0, background: '#fff', border: '1px solid #e1e1e3', borderRadius: 12, boxShadow: '0 8px 24px rgba(0,0,0,0.12)', zIndex: 50, padding: 12, minWidth: 240 }}>
          {/* Month/year header with nav */}
          <div style={{ display: 'flex', alignItems: 'center', justifyContent: 'space-between', marginBottom: 12 }}>
            <button onClick={prevMonth} style={{ border: 'none', background: 'transparent', cursor: 'pointer', padding: 4, display: 'flex', alignItems: 'center', color: '#9a9a9c' }}>
              <svg width={16} height={16} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth={2}><polyline points="15 18 9 12 15 6"/></svg>
            </button>
            <span style={{ fontSize: 13, fontWeight: 600, color: '#1d1d1f' }}>{monthYear}</span>
            <button onClick={nextMonth} style={{ border: 'none', background: 'transparent', cursor: 'pointer', padding: 4, display: 'flex', alignItems: 'center', color: '#9a9a9c' }}>
              <svg width={16} height={16} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth={2}><polyline points="9 18 15 12 9 6"/></svg>
            </button>
          </div>

          {/* Day labels */}
          <div style={{ display: 'grid', gridTemplateColumns: 'repeat(7, 1fr)', gap: 4, marginBottom: 8, textAlign: 'center' }}>
            {['S', 'M', 'T', 'W', 'T', 'F', 'S'].map(d => (
              <div key={d} style={{ fontSize: 11, fontWeight: 600, color: TEXT.muted, height: 24, display: 'flex', alignItems: 'center', justifyContent: 'center' }}>{d}</div>
            ))}
          </div>

          {/* Days grid */}
          <div style={{ display: 'grid', gridTemplateColumns: 'repeat(7, 1fr)', gap: 4 }}>
            {days.map((day, i) => {
              const isSelected = day && selected.getDate() === day && selected.getMonth() === viewMonth.getMonth() && selected.getFullYear() === viewMonth.getFullYear();
              return (
                <button key={i} onClick={() => day && pickDate(day)}
                  disabled={!day}
                  style={{
                    border: isSelected ? '1.5px solid #5a58ff' : '1px solid transparent',
                    background: isSelected ? '#eaeaff' : 'transparent',
                    color: isSelected ? '#3d33cc' : day ? '#1d1d1f' : '#e1e1e3',
                    borderRadius: 6,
                    padding: '6px 0',
                    font: `${isSelected ? 600 : 400} 12px var(--eds-font-family, 'Figtree', sans-serif)`,
                    cursor: day ? 'pointer' : 'default',
                    display: 'flex',
                    alignItems: 'center',
                    justifyContent: 'center',
                    transition: 'all .12s'
                  }}
                  onMouseEnter={e => { if (day && !isSelected) e.currentTarget.style.background = '#f4f4f6'; }}
                  onMouseLeave={e => { if (day && !isSelected) e.currentTarget.style.background = 'transparent'; }}>
                  {day}
                </button>
              );
            })}
          </div>
        </div>
      )}
    </div>
  );
}

          transition: 'border-color .12s, background .12s, color .12s'
        }}
        onMouseEnter={(e) => { if (!open) e.currentTarget.style.borderColor = '#5a58ff'; }}
        onMouseLeave={(e) => { if (!open) e.currentTarget.style.borderColor = '#e1e1e3'; }}>
        Level {currentLevel}
        <svg width={14} height={14} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth={2} strokeLinecap="round" strokeLinejoin="round" style={{ transform: open ? 'rotate(180deg)' : 'rotate(0deg)', transition: 'transform .2s' }}>
          <polyline points="6 9 12 15 18 9" />
        </svg>
      </button>
      {open && (
        <div style={{
          position: 'absolute',
          top: 'calc(100% + 4px)',
          left: 0,
          background: '#fff',
          border: '1px solid #e1e1e3',
          borderRadius: 8,
          boxShadow: '0 4px 12px rgba(0,0,0,0.1)',
          zIndex: 40,
          minWidth: '100%',
          overflow: 'hidden'
        }}>
          {levels.map((level) => (
            <button
              key={level}
              onClick={() => { onChange(studentId, level); setOpen(false); }}
              style={{
                display: 'block',
                width: '100%',
                padding: '10px 12px',
                background: currentLevel === level ? '#eaeaff' : '#fff',
                color: currentLevel === level ? '#3d33cc' : '#49494b',
                border: 'none',
                font: currentLevel === level ? '600 13px var(--eds-font-family, \'Figtree\', sans-serif)' : '400 13px var(--eds-font-family, \'Figtree\', sans-serif)',
                textAlign: 'left',
                cursor: 'pointer',
                transition: 'background .12s'
              }}
              onMouseEnter={(e) => { if (currentLevel !== level) e.currentTarget.style.background = '#f4f4f6'; }}
              onMouseLeave={(e) => { if (currentLevel !== level) e.currentTarget.style.background = '#fff'; }}>
              Level {level}
            </button>
          ))}
        </div>
      )}
    </div>
  );
}

/* Dismiss-from-view button with a clarifying tooltip */
function DismissButton({ onClick }) {
  const [hov, setHov] = React.useState(false);
  return (
    <div style={{ position: 'relative', flexShrink: 0, marginTop: -2, marginRight: -4 }}
      onMouseEnter={() => setHov(true)} onMouseLeave={() => setHov(false)}>
      <button aria-label="Dismiss from this view" onClick={onClick}
        style={{ border: 'none', background: hov ? '#f4f4f6' : 'transparent', cursor: 'pointer', padding: 4, display: 'flex', borderRadius: 8, color: hov ? '#1d1d1f' : '#b0b0b2', transition: 'background .12s, color .12s' }}>
        <svg width={18} height={18} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth={2} strokeLinecap="round" strokeLinejoin="round">
          <path d="M18 6 6 18" />
          <path d="m6 6 12 12" />
        </svg>
      </button>
      {hov && (
        <div role="tooltip" style={{ position: 'absolute', top: '100%', right: 0, marginTop: 6, background: '#1d1d1f', color: '#fff', padding: '7px 11px', borderRadius: 9, whiteSpace: 'nowrap', boxShadow: '0 6px 22px rgba(0,0,0,0.22)', zIndex: 60, pointerEvents: 'none', fontSize: 13, fontWeight: 600 }}>
          Dismiss from this view
        </div>)}
    </div>);
}

function RosterRunScreen({ onDone }) {
  const [aid, setAid] = React.useState(ASSIGNMENTS[0].id);
  const [scores, setScores] = React.useState({});
  const [prompts, setPrompts] = React.useState({});
  const [notes, setNotes] = React.useState({});
  const [expanded, setExpanded] = React.useState(null);
  const [filter, setFilter] = React.useState('');
  const [removedIds, setRemovedIds] = React.useState(() => new Set());
  const [toast, setToast] = React.useState(null);
  const [levels, setLevels] = React.useState({});
  const inputVariant = 'detailed2';
  const toastTimer = React.useRef(null);
  const inputRefs = React.useRef({});

  // Stable refs for use inside effects
  const aidRef = React.useRef(aid);
  aidRef.current = aid;
  const paperStudentsRef = React.useRef([]);
  const onlineStudentsRef = React.useRef([]);

  function selectAssignment(newAid) {
    setAid(newAid);setExpanded(null);setFilter('');
  }

  // Remove the currently shown assignment from this view (non-destructive, undoable)
  function removeFromView(id) {
    const visible = ASSIGNMENTS.filter((a) => !removedIds.has(a.id));
    const idx = visible.findIndex((a) => a.id === id);
    const next = visible[idx + 1] || visible[idx - 1];
    setRemovedIds((prev) => new Set(prev).add(id));
    if (next) selectAssignment(next.id);
    if (toastTimer.current) clearTimeout(toastTimer.current);
    setToast({ id });
    toastTimer.current = setTimeout(() => setToast(null), 6000);
  }

  function undoRemove(id) {
    setRemovedIds((prev) => {
      const n = new Set(prev);n.delete(id);return n;
    });
    selectAssignment(id);
    if (toastTimer.current) clearTimeout(toastTimer.current);
    setToast(null);
  }
  const selectRef = React.useRef(selectAssignment);
  selectRef.current = selectAssignment;

  function focusStudent(id) {
    setExpanded(id);
    setTimeout(() => {
      const r = inputRefs.current[id];
      if (r) {r.focus();r.select();}
    }, 0);
  }

  function focusChips(sid) {
    setExpanded(sid);
    setTimeout(() => {
      const chips = document.querySelectorAll(`.rr-prompt-chip[data-sid="${sid}"]`);
      if (chips[0]) chips[0].focus();
    }, 80);
  }

  function focusOnlineCard(sid) {
    setExpanded(sid);
    setTimeout(() => {
      const card = document.querySelector(`[data-card-sid="${sid}"]`);
      if (card) {
        card.focus();
        function onTab(e) {
          if (e.key === 'Tab') {
            e.preventDefault();
            const chips = document.querySelectorAll(`.rr-prompt-chip[data-sid="${sid}"]`);
            if (chips[0]) chips[0].focus();
            card.removeEventListener('keydown', onTab);
          }
        }
        card.addEventListener('keydown', onTab);
      }
    }, 80);
  }

  // Global ↑/↓ arrow key assignment navigation
  React.useEffect(() => {
    function onGlobalKey(e) {
      if (e.key !== 'ArrowDown' && e.key !== 'ArrowUp') return;
      e.preventDefault();
      const idx = ASSIGNMENTS.findIndex((a) => a.id === aidRef.current);
      if (e.key === 'ArrowDown') {
        if (idx < ASSIGNMENTS.length - 1) selectRef.current(ASSIGNMENTS[idx + 1].id);
      } else {
        if (idx > 0) selectRef.current(ASSIGNMENTS[idx - 1].id);
      }
    }
    window.addEventListener('keydown', onGlobalKey);
    return () => window.removeEventListener('keydown', onGlobalKey);
  }, []);

  function goNextAssignment() {
    const idx = ASSIGNMENTS.findIndex((a) => a.id === aidRef.current);
    if (idx < ASSIGNMENTS.length - 1) selectRef.current(ASSIGNMENTS[idx + 1].id);
  }

  function handleChipEnter(sid) {
    const paper = paperStudentsRef.current;
    const online = onlineStudentsRef.current;
    const pi = paper.findIndex((s) => s.id === sid);
    if (pi >= 0 && pi < paper.length - 1) {
      focusStudent(paper[pi + 1].id);
    } else if (pi === paper.length - 1 && online.length > 0) {
      focusOnlineCard(online[0].id);
    } else {
      const oi = online.findIndex((s) => s.id === sid);
      if (oi >= 0 && oi < online.length - 1) focusOnlineCard(online[oi + 1].id);
      else goNextAssignment();
    }
  }

  const asg = ASSIGNMENTS.find((a) => a.id === aid);
  const paperStudents = React.useMemo(() => studentsFor(aid), [aid]);
  const onlineStudents = React.useMemo(
    () => onlineStudentsFor(aid, paperStudents).map((s) => ({ ...s, online: true })),
    [aid, paperStudents]
  );
  const allStudents = [...paperStudents, ...onlineStudents];
  // Keep refs in sync with latest computed values (must be after useMemo)
  paperStudentsRef.current = paperStudents;
  onlineStudentsRef.current = onlineStudents;

  React.useEffect(() => {
    const updates = {};
    onlineStudents.forEach((s) => {
      const k = s.id + '|' + aid;
      if (scores[k] == null) updates[k] = String(onlineScore(s, aid));
    });
    if (Object.keys(updates).length) setScores((prev) => ({ ...prev, ...updates }));
    setExpanded(paperStudents[0]?.id || null);
    setTimeout(() => {
      const ref = inputRefs.current[paperStudents[0]?.id];
      if (ref) {ref.focus();ref.select();}
    }, 80);
  }, [aid]);

  const doneCount = allStudents.filter((s) => {
    const v = scores[s.id + '|' + aid];
    return v != null && v !== '';
  }).length;

  function handleKeyDown(e, k, sid) {
    if (e.key === 'Enter') {
      e.preventDefault();
      const paper = paperStudentsRef.current;
      const idx = paper.findIndex((s) => s.id === sid);
      if (idx >= 0 && idx < paper.length - 1) {
        focusStudent(paper[idx + 1].id);
      } else if (idx === paper.length - 1 && onlineStudentsRef.current.length > 0) {
        focusOnlineCard(onlineStudentsRef.current[0].id);
      } else if (idx === paper.length - 1) {
        goNextAssignment();
      }
    } else if ((e.key === 'a' || e.key === 'A') && scores[k] === '') {
      e.preventDefault();
      setScores((prev) => ({ ...prev, [k]: 'Abs' }));
      const paper = paperStudentsRef.current;
      const idx = paper.findIndex((s) => s.id === sid);
      if (idx >= 0 && idx < paper.length - 1) focusStudent(paper[idx + 1].id);
    }
  }

  return (
    <div style={{ flex: 1, display: 'flex', flexDirection: 'column', height: '100%', overflow: 'hidden', position: 'relative' }}>
      {/* Top bar */}
      <header style={{ background: '#fff', borderBottom: '1px solid #e1e1e3', padding: '0 32px', height: 60, flexShrink: 0, display: 'flex', alignItems: 'center', gap: 8, justifyContent: 'space-between', position: 'relative' }}>
        <div style={{ display: 'flex', alignItems: 'center', gap: 8 }}>
          <button onClick={onDone} style={{ border: 'none', background: 'transparent', cursor: 'pointer', display: 'flex', alignItems: 'center', gap: 4, color: '#6d6d6f', fontSize: 14, fontWeight: 500, padding: '4px 0' }}>
            <RRIcon name="chevLeft" size={16} />Students
          </button>
          <RRIcon name="chevRight" size={14} color="#c0c0c2" />
          <span style={{ ...TYPE.headingXl }}>Offline scores</span>
        </div>


        <div style={{ display: 'flex', alignItems: 'center', gap: 12 }}>
          <span style={{ fontSize: 13, fontWeight: 500, color: '#016a36', display: 'flex', alignItems: 'center', gap: 5 }}>
            <RRIcon name="check" size={14} color="#016a36" />All changes saved
          </span>
          <RRButton variant="brand" size="md" onClick={onDone}>Done</RRButton>
        </div>
      </header>

      {/* Body */}
      <div style={{ flex: 1, display: 'flex', overflow: 'hidden' }}>
        <AssignmentSidebar selected={aid} scores={scores}
        onSelect={selectAssignment}
        filter={filter} onFilter={setFilter} removedIds={removedIds} />

        {/* Scoring panel */}
        <div style={{ flex: 1, overflowY: 'auto', background: '#f4f4f6', padding: "16px 24px 24px" }}>
          {/* Combined card: lesson header + student rows */}
          <div style={{ background: '#fff', borderRadius: 16, overflow: 'hidden', border: '1px solid #e8e8ea', boxShadow: '0 1px 3px rgba(29,29,31,0.04), 0 6px 24px rgba(29,29,31,0.05)', marginBottom: 16 }}>
          {(() => {
              const meta = getAssignmentMeta(asg?.name || '');
              const subjectColor = (SUBJECT_CFG[meta.subject] || SUBJECT_CFG.math).color;
              const topic = getTopicName(asg?.name);
              return (
                <div style={{ display: 'flex', overflow: 'hidden', minHeight: 140, borderBottom: '1px solid #e1e1e3' }}>
                {/* Thumbnail placeholder */}
                <div style={{
                    width: 160, flexShrink: 0,
                    padding: '16px 0 16px 16px',
                    background: '#fff',
                    display: 'flex', alignItems: 'center', justifyContent: 'center'
                  }}>
                  <div style={{
                      width: '100%', height: '100%',
                      background: '#f0f0f2', borderRadius: 12,
                      display: 'flex', alignItems: 'center', justifyContent: 'center', minHeight: 100
                    }}>
                  <svg width={48} height={48} viewBox="0 0 24 24" fill="none"
                      stroke="#c0c0c4" strokeWidth={1.5} strokeLinecap="round" strokeLinejoin="round">
                    <rect x="3" y="3" width="18" height="18" rx="2" />
                    <circle cx="8.5" cy="8.5" r="1.5" />
                    <polyline points="21 15 16 10 5 21" />
                  </svg>
                  </div>
                </div>
                <div style={{ flex: 1, padding: '18px 20px', display: 'flex', flexDirection: 'column', minWidth: 0 }}>
                  {/* Badge + grade/unit + remove-from-view */}
                  <div style={{ display: 'flex', alignItems: 'center', gap: 8, marginBottom: 8 }}>
                    <SubjectBadge subject={meta.subject} size={28} />
                    <span style={{ fontSize: 14, fontWeight: 700, color: subjectColor }}>
                      1. Unit {meta.unit}
                    </span>
                    <div style={{ flex: 1 }} />
                    <DismissButton onClick={() => removeFromView(aid)} />
                  </div>

                  {/* Topic */}
                  <div style={{ fontSize: 14, color: '#6d6d6f', marginBottom: 4, fontWeight: 400 }}>
                    {topic}
                  </div>

                  {/* Lesson title */}
                  <div style={{ ...TYPE.headingXl, marginBottom: 'auto' }}>
                    {asg?.name}
                  </div>

                  {/* Footer: progress + date — single row */}
                  <div style={{ display: 'flex', alignItems: 'center', gap: 10, marginTop: 12, paddingTop: 12, borderTop: '1px solid #e1e1e3', borderWidth: "0px", borderTopStyle: "solid", borderTopColor: "rgb(225, 225, 227)" }}>
                    <span style={{ fontSize: 13, color: '#9a9a9c', flexShrink: 0 }}>Available {asg?.available}</span>
                    <span style={{ color: TEXT.disabled, fontSize: 13 }}>·</span>
                    <div style={{ flex: 1, height: 5, borderRadius: 99, background: '#e1e1e3', overflow: 'hidden' }}>
                      <div style={{ width: `${Math.round(doneCount / Math.max(allStudents.length, 1) * 100)}%`, height: '100%', background: '#5a58ff', transition: 'width .3s' }} />
                    </div>
                    <span style={{ fontSize: 13, fontWeight: 600, color: '#6d6d6f', flexShrink: 0 }}>{doneCount}/{allStudents.length}</span>
                  </div>
                </div>
              </div>);

            })()}

            {/* Student rows */}
            <div>
            {paperStudents.map((s, idx) =>
              <StudentRow key={s.id} s={s} aid={aid}
              scores={scores} prompts={prompts} notes={notes} levels={levels}
              expanded={expanded === s.id}
              isFirst={idx === 0}
              inputVariant={inputVariant}
              asgAvailable={asg ? asg.available : ''}
              onExpand={setExpanded}
              onScore={(k, v) => setScores((p) => ({ ...p, [k]: v }))}
              onPrompt={(k, v) => setPrompts((p) => ({ ...p, [k]: v }))}
              onNote={(k, v) => setNotes((p) => ({ ...p, [k]: v }))}
              onLevel={(sid, v) => setLevels((p) => ({ ...p, [sid]: v }))}
              inputRef={(el) => inputRefs.current[s.id] = el}
              onKeyDown={handleKeyDown}
              onChipEnter={handleChipEnter} />
              )}

            {onlineStudents.length > 0 &&
              <>
                {onlineStudents.map((s) =>
                <StudentRow key={s.id} s={s} aid={aid}
                scores={scores} prompts={prompts} notes={notes} levels={levels}
                expanded={expanded === s.id} isFirst={false} onExpand={setExpanded}
                onScore={() => {}} onPrompt={(k, v) => setPrompts((p) => ({ ...p, [k]: v }))} onNote={(k, v) => setNotes((p) => ({ ...p, [k]: v }))}
                onLevel={(sid, v) => setLevels((p) => ({ ...p, [sid]: v }))}
                inputRef={() => {}} onKeyDown={() => {}} onChipEnter={handleChipEnter} />
                )}
              </>
              }
            </div>
          </div>

          {/* Keyboard hints */}
          <div style={{ display: 'flex', gap: 16, fontSize: 13, color: '#9a9a9c' }}>
            <span><kbd style={{ background: '#fff', border: '1px solid #e1e1e3', borderRadius: 6, padding: '2px 7px', fontFamily: 'inherit', fontSize: 12.5 }}>↑↓</kbd> change assignment</span>
            <span><kbd style={{ background: '#fff', border: '1px solid #e1e1e3', borderRadius: 6, padding: '2px 7px', fontFamily: 'inherit', fontSize: 12.5 }}>Enter</kbd> next student</span>
          </div>
        </div>
      </div>

      {/* Undo toast for remove-from-view */}
      {toast && (() => {
        const removed = ASSIGNMENTS.find((a) => a.id === toast.id);
        return (
          <div style={{ position: 'absolute', left: '50%', bottom: 28, transform: 'translateX(-50%)', display: 'flex', alignItems: 'center', gap: 16, background: '#1d1d1f', color: '#fff', padding: '12px 16px', borderRadius: 12, boxShadow: '0 8px 30px rgba(0,0,0,0.25)', fontSize: 14, zIndex: 50 }}>
            <span>Dismissed “{removed ? getTopicName(removed.name) || removed.name : 'assignment'}” from this view</span>
            <button onClick={() => undoRemove(toast.id)}
              style={{ border: 'none', background: 'transparent', color: '#a9a7ff', fontWeight: 700, fontSize: 14, cursor: 'pointer', padding: 0 }}>
              Undo
            </button>
          </div>);
      })()}
    </div>);

}

/* ── Root App ─────────────────────────────────────────────────── */
function App() {
  const [screen, setScreen] = React.useState('students');
  return (
    <div style={{ display: 'flex', width: '100vw', height: '100vh', overflow: 'hidden', background: '#f4f4f6' }}>
      <RRAppRail active="users" />
      <div className="rr-screen" key={screen} style={{ flex: 1, overflow: 'hidden', display: 'flex' }}>
        {screen === 'students' ?
        <StudentsScreen onAddScores={() => setScreen('roster')} /> :
        <RosterRunScreen onDone={() => setScreen('students')} />}
      </div>
    </div>);

}

ReactDOM.createRoot(document.getElementById('root')).render(<App />);
</script>
</body>
</html>
