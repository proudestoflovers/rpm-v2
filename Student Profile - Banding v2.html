/* SubjectUnitLabel — atomic component reused in table rows and sidebar
   Renders: [SubjBadge] [colored unit text] [optional level]
   The caller decides what goes after (assignment name inline, or a heading below) */
function SubjectUnitLabel({ subj, unit, level, showLevel = false }) {
  const cfg = SUBJ_CFG[subj] || SUBJ_CFG.Math;
  return (
    <div style={{ display: 'flex', alignItems: 'center', gap: 8, flexShrink: 0 }}>
      <SubjBadge subj={subj} size={28} />
      <span style={{ fontSize: 14, fontWeight: 700, color: cfg.color, whiteSpace: 'nowrap' }}>
        {unit.replace(/^[A-Z]\./, '1.')}
      </span>
      {showLevel &&
      <span style={{ fontSize: 13, fontWeight: 500, color: '#9a9a9c', whiteSpace: 'nowrap' }}>
          Level {level}
        </span>
      }
    </div>);

}

/* ── ScatterTooltip ─────────────────────────────────────────────────── */
function ScatterTooltip({ row, xPct }) {
  const b = BAND[row.band];
  const nearRight = xPct > 65;
  const nearLeft = xPct < 20;
  const hPos = nearRight ?
  { right: 0, left: 'auto', transform: 'none' } :
  nearLeft ?
  { left: 0, transform: 'none' } :
  { left: '50%', transform: 'translateX(-50%)' };
  const caretLeft = nearRight ? 'auto' : nearLeft ? '14px' : '50%';
  const caretRight = nearRight ? '14px' : 'auto';
  return (
    <>
      <style>{`@keyframes tooltipIn { from { opacity:0; translate:0 6px; scale:0.96; } to { opacity:1; translate:0 0; scale:1; } }`}</style>
      <div style={{ position: 'absolute', bottom: 'calc(100% + 8px)', width: 220, background: '#fff', borderRadius: 12, boxShadow: '0 4px 24px rgba(29,29,31,.14)', border: '1px solid #e8e8ea', padding: '12px 14px', zIndex: 999, pointerEvents: 'none', animation: 'tooltipIn 130ms cubic-bezier(0.2,0,0,1.15) both', ...hPos }}>
        <div style={{ marginBottom: 8 }}><SubjectUnitLabel subj={row.subj} unit={row.unit} level={row.lv} /></div>
        <div style={{ fontSize: 13, fontWeight: 700, color: '#1d1d1f', marginBottom: 8, lineHeight: 1.3 }}>{row.name}</div>
        <div style={{ display: 'flex', alignItems: 'center', justifyContent: 'space-between' }}>
          <BandPill band={row.band} sm={true} />
          <span style={{ fontSize: 22, fontWeight: 800, color: b.fg, letterSpacing: '-.02em' }}>{row.sc}%</span>
        </div>
        <div style={{ position: 'absolute', bottom: -6, left: caretLeft, right: caretRight, transform: nearRight || nearLeft ? 'none' : 'translateX(-50%)', width: 10, height: 10, background: '#fff', border: '1px solid #e8e8ea', borderTop: 'none', borderLeft: 'none', rotate: '45deg' }} />
      </div>
    </>);

}

/* ── Scatter strip ───────────────────────────────────────────────────── */
function ScatterStrip({ rows, onView }) {
  const BAND_ORDER = ['prof', 'i', 'e', 'p'];
  const YLABELS = { prof: 'Proficient', i: 'Instructional', e: 'Emerging', p: 'Pre-emerging' };
  const wrapperRef = React.useRef(null);
  const [chartH, setChartH] = React.useState(104);
  const [hoverId, setHoverId] = React.useState(null);

  React.useLayoutEffect(() => {
    if (!wrapperRef.current) return;
    const obs = new ResizeObserver((entries) => {
      const h = entries[0].contentRect.height;
      if (h > 0) setChartH(h);
    });
    obs.observe(wrapperRef.current);
    return () => obs.disconnect();
  }, []);

  const rowH = Math.max(16, Math.floor(chartH / BAND_ORDER.length));
  const done = rows.filter((r) => r.st === 'done').slice().reverse();

  return (
    <div style={{ display: 'flex', flexDirection: 'column', flex: 1, minHeight: 0 }}>
      <div style={{ display: 'flex', flex: 1, minHeight: 0 }}>
        {/* Y-axis labels */}
        <div style={{ width: 84, flexShrink: 0, display: 'flex', flexDirection: 'column' }}>
          {BAND_ORDER.map((b) =>
          <div key={b} style={{ flex: 1, display: 'flex', alignItems: 'center', justifyContent: 'flex-end', paddingRight: 8 }}>
              <span style={{ fontSize: 12, color: '#9a9a9c', fontWeight: 600, whiteSpace: 'nowrap' }}>{YLABELS[b]}</span>
            </div>
          )}
        </div>
        {/* Wrapper — observed for height, chart sized to match */}
        <div ref={wrapperRef} style={{ flex: 1, minHeight: 0, overflow: 'visible' }}>
          <div style={{ position: 'relative', height: chartH, borderRadius: 7, borderTop: '1px solid #e8e8ea', borderBottom: '1px solid #e8e8ea', overflow: 'visible' }}>
            {BAND_ORDER.map((b, i) =>
            <div key={b} style={{ position: 'absolute', left: 0, right: 0, top: i * rowH, height: rowH, borderBottom: i < 3 ? '1px solid #e8e8ea' : 'none' }} />
            )}
            {done.map((row, i) => {
              const xPct = done.length <= 1 ? 50 : i / (done.length - 1) * 84 + 8;
              const yi = BAND_ORDER.indexOf(row.band);
              const yCtr = yi * rowH + rowH / 2;
              return (
                <div key={row.id}
                onMouseEnter={() => setHoverId(row.id)}
                onMouseLeave={() => setHoverId(null)}
                onClick={() => onView && onView(row)}
                style={{ position: 'absolute', left: `${xPct}%`, top: yCtr, transform: 'translate(-50%,-50%)', zIndex: hoverId === row.id ? 10 : 2, cursor: 'pointer' }}>
                  <SubjBadge subj={row.subj} size={28} />
                  {hoverId === row.id && <ScatterTooltip row={row} xPct={xPct} />}
                </div>);
            })}
          </div>
        </div>
      </div>
      {/* X-axis */}
      {done.length > 0 &&
      <div style={{ display: 'flex', justifyContent: 'space-between', marginLeft: 84, marginTop: 3, margin: "6px 0px 0px 84px" }}>
          <span style={{ fontSize: 12, color: '#9a9a9c' }}>{done[0]?.date}</span>
          {done.length > 1 && <span style={{ fontSize: 12, color: '#9a9a9c' }}>{done[done.length - 1]?.date}</span>}
        </div>
      }
    </div>);

}

function FilterPill({ label }) {
  return (
    <div style={{ display: 'inline-flex', alignItems: 'center', gap: 6, background: '#fff', border: '1px solid #e1e1e3', borderRadius: 9, padding: '7px 13px', fontSize: 13.5, fontWeight: 500, color: '#49494b', cursor: 'pointer', userSelect: 'none' }}>

    </div>);

}

function StatusPill({ st }) {
  const s = STS_CFG[st] || STS_CFG.ns;
  return (
    <span style={{ display: 'inline-flex', alignItems: 'center', gap: 6, background: '#F9F9FA', color: s.color, borderRadius: 100, padding: '5px 12px', fontSize: 13.5, fontWeight: 400, whiteSpace: 'nowrap' }}>
      <StatusIcon type={st} />
      {s.label}
    </span>);

}

function BandPill({ band, sm = true }) {
  if (!band) return null;
  const b = BAND[band];
  return (
    <span style={{ display: 'inline-flex', alignItems: 'center', gap: 5, background: b.bg, color: b.fg, borderRadius: 100, padding: sm ? '3px 10px' : '5px 14px', fontSize: sm ? 12.5 : 14, fontWeight: 600, whiteSpace: 'nowrap', border: `1px solid ${b.border}` }}>
      {b.label}
    </span>);

}

function ScoreBar({ sc, band }) {
  const fill = band ? BAND[band].bar : '#d1d5db';
  const track = band && sc ? BAND[band].bg : '#e8e8ea';
  const color = band ? BAND[band].fg : '#9ca3af';
  return (
    <div style={{ display: 'flex', alignItems: 'center', gap: 10, minWidth: 150 }}>
      <div style={{ flex: 1, height: 10, background: track, borderRadius: 2, overflow: 'hidden' }}>
        {sc !== null && sc > 0 &&
        <div style={{ width: `${sc}%`, height: '100%', background: fill }} />
        }
      </div>
      <span style={{ fontSize: 13.5, fontWeight: 700, color: sc ? color : '#9ca3af', width: 40, textAlign: 'right' }}>
        {sc !== null ? `${sc}%` : '0%'}
      </span>
    </div>);

}

/* ── Annotated bar for side panel ───────────────────────────────────── */
function AnnotatedBar({ sc, band, subj }) {
  const fill = band ? BAND[band].bar : '#d1d5db';
  const track = band && sc ? BAND[band].bg : '#e8e8ea';
  return (
    <div style={{ position: 'relative', height: 15, borderRadius: 4, overflow: 'hidden', background: track }}>
      {sc !== null && sc > 0 &&
      <div style={{ width: `${sc}%`, height: '100%', background: fill, borderRadius: 4 }} />
      }
    </div>);

function SubjBadge({ subj, size = 28 }) {

  const iconSize = Math.round(size * 0.66);
  return (
    <div style={{ width: size, height: size, borderRadius: '50%', background: cfg.bg, flexShrink: 0,
      display: 'flex', alignItems: 'center', justifyContent: 'center' }}>
      <svg width={iconSize} height={iconSize} viewBox="0 0 24 24" fill="none"
      style={{ color: cfg.color }}>
        <g transform={cfg.transform}>
          <path d={cfg.path} fill="currentColor" fillRule="nonzero" />
        </g>
      </svg>
    </div>);

}

/* ── Header ──────────────────────────────────────────────────────────── */
function Header({ student, rows, onView }) {
  const nsCount = rows.filter((r) => r.st === 'ns').length;
  const ipCount = rows.filter((r) => r.st === 'ip').length;
  const doneRows = rows.filter((r) => r.st === 'done');
  const avgSc = doneRows.length ? Math.round(doneRows.reduce((s, r) => s + (r.sc || 0), 0) / doneRows.length) : 0;
  const avgKey = avgSc >= 80 ? 'prof' : avgSc >= 55 ? 'i' : avgSc >= 33 ? 'e' : 'p';
  const avgBand = BAND[avgKey];

  function goBack() {
    window.location.href = 'Roster Run HiFi v2.html';
  }

  return (
    <div style={{ background: '#fff', borderBottom: '1px solid #e1e1e3', padding: '14px 32px 0', flexShrink: 0 }}>
      <button onClick={goBack} style={{ display: 'flex', alignItems: 'center', gap: 5, fontSize: 13.5, fontWeight: 600, color: '#49494b', marginBottom: 14, cursor: 'pointer' }}>
        <Ico n="chevLeft" size={15} sw={2.5} stroke="#49494b" />
        All students
      </button>

      <div style={{ display: 'flex', gap: 16, marginBottom: 18, flexWrap: 'wrap', justifyContent: "space-between", alignItems: "flex-start", margin: "8px 0px 18px", padding: "12px 0px 0px" }}>
        {/* Avatar + name lockup */}
        <div style={{ display: 'flex', alignItems: 'center', gap: 16, flexShrink: 0, padding: "12px 0px 0px" }}>
          <div style={{ width: 52, height: 52, borderRadius: '50%', background: '#f4f4f6', flexShrink: 0,
            display: 'flex', alignItems: 'center', justifyContent: 'center', fontSize: 30, lineHeight: 1,
            border: '1px solid #ebebeb', overflow: 'hidden', userSelect: 'none' }}>
            {student.emoji}
          </div>
          <div>
            <div style={{ fontSize: 26, fontWeight: 800, color: '#1d1d1f', letterSpacing: '-.02em', lineHeight: 1.2 }}>{student.name}</div>
            <div style={{ fontSize: 13.5, color: '#6d6d6f', fontWeight: 500, marginTop: 2 }}>{student.grade}</div>
          </div>
        </div>

        {/* Single stat card — summary + scatter */}
        <div style={{ background: '#f8f8fe', border: '1px solid #ddddfb', borderRadius: 14, padding: '18px 18px 24px', marginLeft: 8, width: "800px", display: 'flex', flexDirection: 'column', gap: "13px", height: "300px" }}>
          <div style={{ display: 'flex', alignItems: 'center', justifyContent: 'space-between', gap: 8, marginBottom: 10, flexShrink: 0 }}>
            <div style={{ fontSize: 15, fontWeight: "600", color: "rgb(109, 109, 111)", display: 'flex', alignItems: 'center', gap: 6 }}>
              <Ico n="bars" size={14} stroke={avgBand.bar} sw={2.2} />
              <span style={{ fontWeight: "600", color: "rgb(109, 109, 111)" }}>Not started</span> • {nsCount}
              <span style={{ color: '#d1d5db', margin: '0 7px' }}>·</span>
              <span style={{ fontWeight: "600" }}>In progress</span> • {ipCount}
              <span style={{ color: '#d1d5db', margin: '0 7px' }}>·</span>
              <span style={{ fontWeight: "600", color: "rgb(109, 109, 111)" }}>Complete</span> • {doneRows.length}
            </div>
            <div style={{ display: 'flex', gap: 6, flexShrink: 0 }}>
              {['Last 7 days', 'All subjects'].map((l) =>
              <FilterPill key={l} label={l} />
              )}
            </div>
          </div>

          <div style={{ flex: 1, minHeight: 0, display: 'flex', flexDirection: 'column' }}>
            <ScatterStrip rows={rows} onView={onView} />
          </div>

          {doneRows.length > 0 &&
          <div style={{ display: 'flex', alignItems: 'center', gap: 5, fontWeight: 600, color: '#6d6d6f', fontSize: "14px" }}>
              Average • <span style={{ ...{ color: avgBand.fg }, color: "rgb(29, 29, 31)" }}>{avgBand.label}</span>
            </div>
          }
        </div>
      </div>

      {/* Tabs */}
      <div style={{ display: 'flex' }}>
        {['Past assignments', 'Upcoming assignments', 'Settings'].map((t, i) =>
        <div key={t} style={{ padding: '0 0 12px', marginRight: 26, fontSize: 14.5, fontWeight: 600, cursor: 'pointer', color: i === 0 ? '#1d1d1f' : '#6d6d6f', borderBottom: i === 0 ? '2.5px solid #5a58ff' : '2.5px solid transparent', transition: 'color .15s' }}>
            {t}
          </div>
        )}
      </div>
    </div>);

}

/* ── Filter bar ──────────────────────────────────────────────────────── */
function FilterBar() {
  return (
    <div style={{ display: 'flex', alignItems: 'center', gap: 10, marginBottom: 18 }}>
      {['All subjects', 'All statuses', 'All dates'].map((l) =>
      <FilterPill key={l} label={l} />
      )}
    </div>);

}

/* ── Table row ───────────────────────────────────────────────────────── */
function TableRow({ row, selected, onSelect, onView }) {
  const [hov, setHov] = React.useState(false);
  const b = row.band ? BAND[row.band] : null;
  return (
    <tr onMouseEnter={() => setHov(true)} onMouseLeave={() => setHov(false)} onClick={() => onView(row)}
    style={{ background: selected ? '#f5f5ff' : hov ? '#fafafa' : '#fff', transition: 'background .1s', borderBottom: '1px solid #f0f0f2', cursor: 'pointer' }}>
      <td style={{ padding: '0 0 0 16px', width: 44, verticalAlign: 'middle' }}>
        <div onClick={(e) => {e.stopPropagation();onSelect(row.id);}} style={{ width: 18, height: 18, borderRadius: 5, cursor: 'pointer', border: selected ? '2px solid #5a58ff' : '1.5px solid #c5c5c7', background: selected ? '#5a58ff' : '#fff', display: 'flex', alignItems: 'center', justifyContent: 'center' }}>
          {selected && <Ico n="check" size={10} stroke="#fff" sw={3} />}
        </div>
      </td>
      <td style={{ padding: '14px 16px', width: 'auto', whiteSpace: 'nowrap', verticalAlign: 'middle' }}>
        <div style={{ display: 'flex', alignItems: 'center', gap: 8, minWidth: 0 }}>
          <SubjectUnitLabel subj={row.subj} unit={row.unit} level={row.lv} />
          <span style={{ fontSize: 14, color: '#1d1d1f', fontWeight: 400, overflow: 'hidden', textOverflow: 'ellipsis', whiteSpace: 'nowrap' }}>{row.name}</span>
        </div>
      </td>
      <td style={{ padding: '14px 16px', width: 70, fontSize: 14, fontWeight: 600, color: '#49494b', verticalAlign: 'middle' }}>{row.lv}</td>
      <td style={{ padding: '14px 16px', width: 145, fontSize: 13.5, color: '#49494b', whiteSpace: 'nowrap', verticalAlign: 'middle' }}>{row.date}</td>
      <td style={{ padding: '14px 16px', width: 148, verticalAlign: 'middle' }}>
        <StatusPill st={row.st} />
      </td>
      <td style={{ padding: '14px 16px', width: 185, verticalAlign: 'middle' }}>
        <ScoreBar sc={row.sc} band={row.band} />
      </td>
      <td style={{ padding: '12px 16px', width: '100%', verticalAlign: 'middle' }}>
        {b ?
        <div>
            <BandPill band={row.band} />
            <div style={{ fontSize: 11.5, color: '#6d6d6f', fontWeight: 500, marginTop: 4, paddingLeft: 2, lineHeight: 1.4, textWrap: 'pretty' }}>
              {BAND_NEXT[row.band]?.(row.lv)}
            </div>
          </div> :
        <span style={{ color: '#d1d5db', fontSize: 16 }}>—</span>}
      </td>
      <td style={{ padding: '14px 16px', width: 60, verticalAlign: 'middle' }}>
        <button onClick={() => onView(row)} style={{ fontSize: 13.5, fontWeight: 600, color: '#5a58ff', cursor: 'pointer', background: 'transparent', border: 'none', fontFamily: 'inherit', padding: 0 }}>
          View
        </button>
      </td>
      <td style={{ padding: '14px 12px 14px 4px', width: 36, verticalAlign: 'middle' }}>
        <button style={{ width: 28, height: 28, borderRadius: 7, display: 'flex', alignItems: 'center', justifyContent: 'center', cursor: 'pointer', border: 'none', color: '#9a9a9c', background: hov ? '#ebebed' : 'transparent' }}>
          <svg width={14} height={3} viewBox="0 0 14 3" fill="currentColor">
            <circle cx="1.5" cy="1.5" r="1.4" /><circle cx="7" cy="1.5" r="1.4" /><circle cx="12.5" cy="1.5" r="1.4" />
          </svg>
        </button>
      </td>
    </tr>);

}

/* ── Table ───────────────────────────────────────────────────────────── */
function AssignmentsTable({ rows, onView }) {
  const [selected, setSelected] = React.useState(new Set());
  const doneRows = rows.filter((r) => r.st === 'done');
  const toggle = (id) => setSelected((prev) => {const n = new Set(prev);n.has(id) ? n.delete(id) : n.add(id);return n;});
  return (
    <div style={{ background: '#fff', borderRadius: 16, border: '1px solid #e8e8ea', overflowX: 'auto', boxShadow: '0 1px 4px rgba(29,29,31,.05)' }}>
      <table style={{ width: '100%', borderCollapse: 'collapse' }}>
        <thead>
          <tr style={{ borderBottom: '1.5px solid #eaeaea', background: '#fafafa' }}>
            <th style={{ padding: '11px 0 11px 16px', width: 44 }}>
              <div style={{ width: 18, height: 18, borderRadius: 5, border: '1.5px solid #c5c5c7' }} />
            </th>
            {['Assignment', 'Level', 'Date available', 'Status', 'Results'].map((h) =>
            <th key={h} style={{ padding: '11px 16px', textAlign: 'left', fontSize: 12.5, fontWeight: 700, color: '#6d6d6f', letterSpacing: '.02em', whiteSpace: 'nowrap', width: h === 'Assignment' ? 'auto' : undefined }}>{h}</th>
            )}
            <th style={{ padding: '11px 16px', textAlign: 'left', fontSize: 12.5, fontWeight: 700, color: '#6d6d6f', letterSpacing: '.02em', whiteSpace: 'nowrap', width: '100%' }}>Performance</th>
            <th style={{ width: 60 }} /><th style={{ width: 36 }} />
          </tr>
        </thead>
        <tbody>
          {doneRows.map((row) =>
          <TableRow key={row.id} row={row} selected={selected.has(row.id)} onSelect={toggle} onView={onView} />
          )}
        </tbody>
      </table>
    </div>);

}

/* ── SuggestionLabel — lightbulb + label for next step suggestions ──── */
function SuggestionLabel({ label }) {
  return (
    <div style={{ display: 'flex', alignItems: 'flex-start', gap: 6, marginBottom: 12 }}>
      <div style={{ marginTop: 2, flexShrink: 0 }}><Ico n="bulb" size={14} stroke="#c5c5c7" sw={2} /></div>
      <span style={{ fontWeight: 500, color: '#1d1d1f', fontSize: "14px" }}>{label}</span>
    </div>);

}

/* ── AssignButton ───────────────────────────────────────────────────── */
function AssignButton({ label, primary = true }) {
  return (
    <button style={{ height: 44, borderRadius: 100, background: primary ? '#141415' : 'transparent', color: primary ? '#fff' : '#1d1d1f', fontFamily: "'Figtree',sans-serif", fontSize: 14, fontWeight: 600, border: primary ? 'none' : '1.5px solid #323234', display: 'flex', alignItems: 'center', justifyContent: 'center', gap: 8, cursor: 'pointer', width: '100%' }}>
      <Ico n="users" size={16} stroke={primary ? '#fff' : 'currentColor'} sw={2.5} />
      {label}
    </button>);

}

/* ── NextStepSection ─────────────────────────────────────────────────── */
function NextStepSection({ row }) {
  const { band, lv, subj, unit, name } = row;

  if (band === 'prof') {
    if (lv <= 2) {
      return (
        <>
          {/* Move to next skill */}
          <section style={{ marginBottom: 20 }}>
            <div style={{ fontSize: 10.5, fontWeight: 700, color: '#9a9a9c', textTransform: 'uppercase', letterSpacing: '.07em', marginBottom: 10 }}>Next step</div>
            <SuggestionLabel label="Move to next skill" />
            <div style={{ marginBottom: 12 }}>
              <LessonPreviewCard subj={subj} unit={unit} level={lv} lessonType="Lesson" title={name} />
            </div>
            <AssignButton label="Assign next skill" primary={true} />
          </section>
          {/* Divider */}
          <div style={{ display: 'flex', alignItems: 'center', gap: 12, margin: '20px 0' }}>
            <div style={{ flex: 1, height: 1, background: '#e8e8ea' }} />
            <span style={{ fontSize: 12, fontWeight: 600, color: '#9a9a9c' }}>or</span>
            <div style={{ flex: 1, height: 1, background: '#e8e8ea' }} />
          </div>
          {/* Move up a level */}
          <section style={{ marginBottom: 24 }}>
            <SuggestionLabel label="Move up a level" />
            <div style={{ marginBottom: 12 }}>
              <LessonPreviewCard subj={subj} unit={unit} level={lv + 1} lessonType="Lesson" title={name} />
            </div>
            <AssignButton label={`Assign Level ${lv + 1}`} primary={false} />
          </section>
        </>);

    }
    // Proficient Level 3
    return (
      <section style={{ marginBottom: 24 }}>
        <div style={{ fontSize: 10.5, fontWeight: 700, color: '#9a9a9c', textTransform: 'uppercase', letterSpacing: '.07em', marginBottom: 10 }}>Next step</div>
        <SuggestionLabel label="Move to next skill" />
        <div style={{ marginBottom: 12 }}>
          <LessonPreviewCard subj={subj} unit={unit} level={lv} lessonType="Lesson" title={name} />
        </div>
        <AssignButton label="Assign next skill" primary={true} />
      </section>);

  }

  if (band === 'i') {
    return (
      <section style={{ marginBottom: 24 }}>
        <div style={{ fontSize: 10.5, fontWeight: 700, color: '#9a9a9c', textTransform: 'uppercase', letterSpacing: '.07em', marginBottom: 10 }}>Next step</div>
        <SuggestionLabel label="Continue at current level with routine instruction and practice." />
        <AssignButton label="Re-assign" primary={true} />
      </section>);

  }

  if (band === 'e') {
    return (
      <section style={{ marginBottom: 24 }}>
        <div style={{ fontSize: 10.5, textTransform: 'uppercase', marginBottom: 10, fontWeight: "500", letterSpacing: "0.6px", color: "rgb(109, 109, 111)" }}>Next step</div>
        <SuggestionLabel label="Reteach ideas" />
        <ul style={{ listStyle: 'none', paddingLeft: 0, marginBottom: 16 }}>
          {[0, 1, 2].map((i) =>
          <li key={i} style={{ display: 'flex', gap: 8, marginBottom: 8, alignItems: 'flex-start' }}>
              <span style={{ width: 6, height: 6, background: '#9a9a9c', borderRadius: '50%', flexShrink: 0, marginTop: 6 }} />
              <div style={{ height: 14, background: '#d1d5db', borderRadius: 3, flex: 1 }} />
            </li>
          )}
        </ul>
        <div style={{ display: 'flex', alignItems: 'center', gap: 12, margin: '20px 0' }}>
          <div style={{ flex: 1, height: 1, background: '#e8e8ea' }} />
          <span style={{ fontSize: 12, fontWeight: 600, color: '#9a9a9c' }}>or</span>
          <div style={{ flex: 1, height: 1, background: '#e8e8ea' }} />
        </div>
        <SuggestionLabel label="Try lower level" />
        <div style={{ marginBottom: 12 }}>
          <LessonPreviewCard subj={subj} unit={unit} level={Math.max(1, lv - 1)} lessonType="Read Aloud" title={name} />
        </div>
        <AssignButton label={`Assign Level ${Math.max(1, lv - 1)}`} primary={true} />
      </section>);

  }

  // Pre-emerging
  return (
    <section style={{ marginBottom: 24 }}>
      <div style={{ fontSize: 10.5, fontWeight: 700, color: '#9a9a9c', textTransform: 'uppercase', letterSpacing: '.07em', marginBottom: 10 }}>Next step</div>
      <SuggestionLabel label="Teach prerequisite skills before continuing this skill." />
      <div style={{ marginBottom: 12 }}>
        <LessonPreviewCard subj={subj} unit={unit} level={lv} lessonType="Lesson" title={name} />
      </div>
      <AssignButton label="Assign previous skill" primary={true} />
    </section>);

}

/* ── LessonPreviewCard ──────────────────────────────────────────────── */
function LessonPreviewCard({ subj, unit, level, lessonType, title }) {
  return (
    <div style={{ display: 'flex', alignItems: 'center', gap: 16, background: '#fff', borderRadius: 16, border: '1px solid #e8e8ea', padding: '14px 16px', boxShadow: '0 1px 3px rgba(29,29,31,.06)' }}>
      {/* Thumbnail placeholder */}
      <div style={{ width: 96, height: 80, borderRadius: 12, background: '#f0f0f2', flexShrink: 0, display: 'flex', alignItems: 'center', justifyContent: 'center' }}>
        <svg width={36} height={32} viewBox="0 0 36 32" fill="none">
          <rect x="1" y="1" width="34" height="30" rx="4" stroke="#c5c5c7" strokeWidth="1.5" fill="#e8e8ea" />
          <circle cx="12" cy="12" r="4" fill="#c5c5c7" />
          <path d="M1 22l8-6 6 5 5-4 15 10" stroke="#c5c5c7" strokeWidth="1.5" strokeLinecap="round" strokeLinejoin="round" fill="none" />
        </svg>
      </div>
      {/* Content */}
      <div style={{ flex: 1, minWidth: 0, display: 'flex', flexDirection: 'column', gap: 4 }}>
        <SubjectUnitLabel subj={subj} unit={unit} level={level} />
        <div style={{ fontSize: 12.5, color: '#6d6d6f', fontWeight: 500 }}>{lessonType}</div>
        <div style={{ fontSize: 15, fontWeight: 700, color: '#1d1d1f', lineHeight: 1.3, overflow: 'hidden', textOverflow: 'ellipsis', whiteSpace: 'nowrap' }}>{title}</div>
      </div>
    </div>);

}

/* ── Side panel ──────────────────────────────────────────────────────── */
function SidePanel({ row, onClose, onPrev, onNext, idx, total }) {
  const b = row?.band ? BAND[row.band] : null;
  const open = !!(row && b);
  return (
    <>
      <div onClick={onClose} style={{ position: 'fixed', inset: 0, background: 'rgba(29,29,31,.18)', zIndex: 100, opacity: open ? 1 : 0, pointerEvents: open ? 'auto' : 'none', transition: 'opacity .22s' }} />
      <aside style={{ position: 'fixed', top: 0, right: 0, bottom: 0, width: 420, background: '#fff', zIndex: 101, boxShadow: '-4px 0 40px rgba(29,29,31,.12)', transform: open ? 'translateX(0)' : 'translateX(100%)', transition: 'transform .26s cubic-bezier(.4,0,.2,1)', display: 'flex', flexDirection: 'column' }}>
        {open && <>
          {/* Header — meta row + nav only, fits 64px */}
          <div style={{ padding: '0 24px', display: 'flex', alignItems: 'center', gap: 12, justifyContent: 'space-between', height: '64px', flexShrink: 0 }}>
            <div style={{ flex: 1 }}><SubjectUnitLabel subj={row.subj} unit={row.unit} level={row.lv} /></div>
            <div style={{ display: 'flex', alignItems: 'center', gap: 4, flexShrink: 0 }}>
              <button onClick={onPrev} disabled={!onPrev} style={{ width: 32, height: 32, borderRadius: 8, background: '#f4f4f6', display: 'flex', alignItems: 'center', justifyContent: 'center', cursor: onPrev ? 'pointer' : 'default', border: 'none', opacity: onPrev ? 1 : 0.35 }}>
                <Ico n="arrowUp" size={15} stroke="#49494b" sw={2.5} />
              </button>
              <button onClick={onNext} disabled={!onNext} style={{ width: 32, height: 32, borderRadius: 8, background: '#f4f4f6', display: 'flex', alignItems: 'center', justifyContent: 'center', cursor: onNext ? 'pointer' : 'default', border: 'none', opacity: onNext ? 1 : 0.35 }}>
                <Ico n="arrowDown" size={15} stroke="#49494b" sw={2.5} />
              </button>
              <button onClick={onClose} style={{ width: 32, height: 32, borderRadius: 8, background: '#f4f4f6', display: 'flex', alignItems: 'center', justifyContent: 'center', cursor: 'pointer', flexShrink: 0, border: 'none' }}>
                <Ico n="x" size={15} stroke="#49494b" sw={2.5} />
              </button>
            </div>
          </div>

          <div style={{ flex: 1, overflowY: 'auto', padding: "2px 24px 28px" }}>
            {/* Assignment name */}
            <div style={{ fontSize: 20, fontWeight: 700, color: '#1d1d1f', lineHeight: 1.3, marginBottom: 20 }}>{row.name}</div>
            {/* Result section — full width with divider */}
            <section style={{ marginBottom: 20, paddingBottom: 20, borderBottom: '1px solid #e8e8ea', marginLeft: -24, marginRight: -24, paddingLeft: 24, paddingRight: 24 }}>
              <div style={{ display: 'flex', justifyContent: 'space-between', marginBottom: 14, fontSize: 11, fontWeight: 700, color: '#9a9a9c', letterSpacing: '.05em' }}>
                <div><span style={{ color: '#6d6d6f', fontWeight: 500 }}>Date available</span><br /><span style={{ color: '#1d1d1f', fontWeight: 600, marginTop: 2, display: 'block', fontSize: "14px", letterSpacing: "0px" }}>Dec 1, 2025</span></div>
                <div style={{ textAlign: 'right' }}><span style={{ color: '#6d6d6f', fontWeight: 500 }}>Date completed</span><br /><span style={{ color: '#1d1d1f', fontWeight: 600, marginTop: 2, display: 'block', fontSize: "14px", letterSpacing: "0px" }}>{row.date}</span></div>
              </div>
              
              <div style={{ fontSize: 13, fontWeight: 600, color: '#6d6d6f', marginBottom: 14 }}>Level {row.lv}</div>

              {/* Score and bar in horizontal layout — bar left, score right */}
              <div style={{ display: 'flex', gap: 12, marginBottom: 8, alignItems: 'center' }}>
                <div style={{ flex: 1 }}>
                  <AnnotatedBar sc={row.sc} band={row.band} subj={row.subj} />
                </div>
                <div style={{ fontWeight: 800, color: b.fg, letterSpacing: '-.02em', lineHeight: 1, flexShrink: 0, fontSize: "24px" }}>{row.sc}%</div>
              </div>

              {/* Band and threshold together at bottom */}
              <div style={{ display: 'flex', justifyContent: 'space-between', alignItems: 'flex-end', paddingTop: 6 }}>
                <div>
                  <BandPill band={row.band} sm={true} />
                </div>
                <div style={{ textAlign: 'right' }}>
                  <div style={{ display: 'flex', alignItems: 'baseline', gap: 6 }}>
                    <span style={{ fontSize: 10.5, fontWeight: 600, color: '#9a9a9c' }}>Math threshold</span>
                    <span style={{ fontWeight: 800, color: b.fg, fontSize: "11px" }}>{THRESHOLDS[row.band]?.[row.subj]}</span>
                  </div>
                </div>
              </div>
            </section>

            {/* Next step — band & level conditional */}
            <NextStepSection row={row} />
          </div>
        </>}
      </aside>
    </>);

}

/* ── App ─────────────────────────────────────────────────────────────── */
function App() {
  const [panelRow, setPanelRow] = React.useState(null);
  const doneRows = ROWS.filter((r) => r.st === 'done');
  const currentIdx = panelRow ? doneRows.findIndex((r) => r.id === panelRow.id) : -1;
  const goTo = (delta) => {
    const next = doneRows[currentIdx + delta];
    if (next) setPanelRow(next);
  };
  return (
    <div style={{ display: 'flex', height: '100vh', overflow: 'hidden', fontFamily: "'Figtree',-apple-system,sans-serif" }}>
      <NavRail />
      <div style={{ flex: 1, display: 'flex', flexDirection: 'column', overflow: 'hidden', background: '#f4f4f6' }}>
        <Header student={PROFILE_STUDENT} rows={ROWS} onView={setPanelRow} />
        <div style={{ flex: 1, overflow: 'auto', padding: '20px 32px 32px' }}>
          <FilterBar />
          <AssignmentsTable rows={ROWS} onView={setPanelRow} />
        </div>
      </div>
      <SidePanel row={panelRow} onClose={() => setPanelRow(null)} onPrev={currentIdx > 0 ? () => goTo(-1) : null} onNext={currentIdx < doneRows.length - 1 ? () => goTo(1) : null} idx={currentIdx} total={doneRows.length} />
    </div>);

}

ReactDOM.createRoot(document.getElementById('root')).render(<App />);
</script>
</body>
</html>
